        break;
      case 'hammer':
        roughLine(ctx, hx, hy + 10 * s, hx + 6 * s, hy - 34 * s, 4);
        roughCircle(ctx, hx + 7 * s, hy - 38 * s, 9 * s, 10);
        break;
      case 'bow':
        roughCircle(ctx, hx + 4 * s, hy - 14 * s, 22 * s, 16);
        roughLine(ctx, hx + 4 * s + 22 * s, hy - 14 * s, hx + 4 * s - 22 * s, hy - 14 * s, 2);
        break;
      case 'staff':
        roughLine(ctx, hx, hy + 24 * s, hx + 8 * s, hy - 48 * s, 4);
        roughCircle(ctx, hx + 9 * s, hy - 52 * s, 6 * s, 10);
        break;
    }
  }

  function drawOffhandOverlay(ctx, x, y, scale, isShield) {
    setPencilStyle(ctx, '#1a1a1a', 2.2);
    const s = scale;
    const lx = x - 28 * s, ly = y - 8 * s;
    if (isShield) {
      ctx.beginPath();
      ctx.moveTo(lx, ly - 16 * s);
      ctx.lineTo(lx - 10 * s, ly - 8 * s);
      ctx.lineTo(lx - 10 * s, ly + 10 * s);
      ctx.lineTo(lx, ly + 18 * s);
      ctx.lineTo(lx + 10 * s, ly + 10 * s);
      ctx.lineTo(lx + 10 * s, ly - 8 * s);
      ctx.closePath();
      ctx.stroke();
    } else {
      // torch
      roughLine(ctx, lx, ly + 14 * s, lx, ly - 14 * s, 3);
      roughCircle(ctx, lx, ly - 18 * s, 5 * s, 8);
    }
  }

  function drawHelmetOverlay(ctx, x, y, scale) {
    setPencilStyle(ctx, '#1a1a1a', 2.2);
    const s = scale;
    roughLine(ctx, x - 19 * s, y - 70 * s, x + 19 * s, y - 70 * s, 3);
    roughCircle(ctx, x, y - 64 * s, 19 * s, 16);
  }

  function drawChestOverlay(ctx, x, y, scale) {
    setPencilStyle(ctx, '#1a1a1a', 2.2);
    const s = scale;
    ctx.beginPath();
    ctx.moveTo(x - 16 * s, y - 36 * s);
    ctx.lineTo(x + 16 * s, y - 36 * s);
    ctx.lineTo(x + 12 * s, y + 6 * s);
    ctx.lineTo(x - 12 * s, y + 6 * s);
    ctx.closePath();
    ctx.stroke();
    roughLine(ctx, x, y - 34 * s, x, y + 4 * s, 2);
  }

  function drawBootsOverlay(ctx, x, y, scale) {
    setPencilStyle(ctx, '#1a1a1a', 2);
    const s = scale;
    roughLine(ctx, x - 13 * s, y + 46 * s, x - 4 * s, y + 52 * s, 2);
    roughLine(ctx, x + 13 * s, y + 46 * s, x + 4 * s, y + 52 * s, 2);
  }

  function drawAccessoryIcons(ctx, x, y, scale, hasRing, hasAmulet) {
    setPencilStyle(ctx, '#555', 1.5);
    const s = scale;
    if (hasAmulet) roughCircle(ctx, x, y - 28 * s, 4 * s, 8);
    if (hasRing) roughCircle(ctx, x + 24 * s, y - 4 * s, 3 * s, 8);
  }

  // Cloak/cape/backpack, drawn BEHIND the body silhouette so it reads as worn on the back rather
  // than floating in front. Drawn wider than the body and with a lighter, slightly textured stroke
  // so it reads as a separate draped layer rather than blending into the body outline.
  function drawBackOverlay(ctx, x, y, scale, isBackpack) {
    const s = scale;
    if (isBackpack) {
      setPencilStyle(ctx, '#5a5a5a', 2 * s);
      ctx.beginPath();
      ctx.moveTo(x - 13 * s, y - 28 * s);
      ctx.lineTo(x + 15 * s, y - 28 * s);
      ctx.lineTo(x + 16 * s, y + 6 * s);
      ctx.lineTo(x - 14 * s, y + 6 * s);
      ctx.closePath();
      ctx.stroke();
      roughLine(ctx, x - 13 * s, y - 18 * s, x + 15 * s, y - 18 * s, 1.4);
      roughCircle(ctx, x, y - 10 * s, 3 * s, 8);
    } else {
      setPencilStyle(ctx, '#5a5a5a', 2.2 * s);
      ctx.beginPath();
      ctx.moveTo(x - 17 * s, y - 38 * s);
      ctx.quadraticCurveTo(x - 30 * s, y + 2 * s, x - 18 * s, y + 38 * s);
      ctx.lineTo(x + 18 * s, y + 38 * s);
      ctx.quadraticCurveTo(x + 30 * s, y + 2 * s, x + 17 * s, y - 38 * s);
      ctx.closePath();
      ctx.stroke();
      roughLine(ctx, x - 17 * s, y - 38 * s, x + 17 * s, y - 38 * s, 1.6);
      // a couple of fold lines so it reads as fabric rather than a second body outline
      roughLine(ctx, x - 10 * s, y - 20 * s, x - 14 * s, y + 20 * s, 1);
      roughLine(ctx, x + 10 * s, y - 20 * s, x + 14 * s, y + 20 * s, 1);
    }
  }

  // Drawn in the player's free hand when actively casting a known spell. If a two-handed weapon is
  // equipped, the glow is drawn near the chest instead since both hands are full holding the weapon.
  function drawSpellCastOverlay(ctx, x, y, scale, twoHanded) {
    setPencilStyle(ctx, '#6a4fa0', 1.8 * scale);
    const s = scale;
    const hx = twoHanded ? x - 8 * s : x - 26 * s;
    const hy = twoHanded ? y + 20 * s : y - 6 * s;
    roughCircle(ctx, hx, hy, 7 * s, 10);
    setPencilStyle(ctx, '#9a7fd0', 1.4 * scale);
    roughLine(ctx, hx - 4 * s, hy - 14 * s, hx + 4 * s, hy - 20 * s, 1.4);
    roughLine(ctx, hx + 4 * s, hy - 14 * s, hx - 4 * s, hy - 20 * s, 1.4);
    roughLine(ctx, hx - 12 * s, hy, hx - 16 * s, hy - 4 * s, 1.2);
    roughLine(ctx, hx + 12 * s, hy, hx + 16 * s, hy - 4 * s, 1.2);
  }

  // Drawn in the player's free hand when drinking a potion (immediately after using a consumable).
  function drawPotionHeldOverlay(ctx, x, y, scale, twoHanded) {
    setPencilStyle(ctx, '#2b2b2b', 1.6 * scale);
    const s = scale;
    const hx = twoHanded ? x - 8 * s : x - 26 * s;
    const hy = twoHanded ? y + 20 * s : y - 6 * s;
    ctx.beginPath();
    ctx.moveTo(hx - 5 * s, hy - 2 * s);
    ctx.quadraticCurveTo(hx - 6 * s, hy + 10 * s, hx, hy + 12 * s);
    ctx.quadraticCurveTo(hx + 6 * s, hy + 10 * s, hx + 5 * s, hy - 2 * s);
    ctx.closePath();
    ctx.stroke();
    roughLine(ctx, hx - 2 * s, hy - 2 * s, hx - 2 * s, hy - 8 * s, 1.2);
    roughLine(ctx, hx + 2 * s, hy - 2 * s, hx + 2 * s, hy - 8 * s, 1.2);
  }

  // Full character composite draw with equipment, given resolved item objects.
  // heldItem: optional string - 'spell' (mid spellcast glow), 'potion' (drinking), or null/undefined.
  // Draws belt/quiver/spellbook items that the character is visibly carrying but not actively using.
  // Called at the very end of drawCharacter so these always sit on top of armour overlays.
  // Each visual is small and reads as "attached to the belt" — distinct from the active held-item
  // overlays (drawPotionHeldOverlay / drawSpellCastOverlay) that show during action frames.
  function drawCarriedItems(ctx, x, y, scale, carry, isTwoHanded) {
    if (!carry) return;
    const s = scale;

    // ---- POTION AT BELT (left hip) ----
    // A small flask dangling from the belt. Drawn only when the loadout actually has potions.
    if (carry.hasPotionAtBelt) {
      setPencilStyle(ctx, '#2b2b2b', 1.4 * s);
      const bx = x - 20 * s, by = y + 12 * s;
      // flask body
      ctx.beginPath();
      ctx.moveTo(bx - 3 * s, by - 2 * s);
      ctx.quadraticCurveTo(bx - 4 * s, by + 6 * s, bx, by + 8 * s);
      ctx.quadraticCurveTo(bx + 4 * s, by + 6 * s, bx + 3 * s, by - 2 * s);
      ctx.closePath(); ctx.stroke();
      // neck
      roughLine(ctx, bx - 1.5 * s, by - 2 * s, bx - 1.5 * s, by - 5 * s, 1);
      roughLine(ctx, bx + 1.5 * s, by - 2 * s, bx + 1.5 * s, by - 5 * s, 1);
      roughLine(ctx, bx - 2 * s, by - 5 * s, bx + 2 * s, by - 5 * s, 1);
      // belt loop
      roughLine(ctx, bx - 4 * s, by - 2 * s, bx + 4 * s, by - 2 * s, 1.2);
    }

    // ---- QUIVER AT BACK/HIP (right side, behind weapon arm for bow users) ----
    if (carry.hasQuiver) {
      setPencilStyle(ctx, '#2b2b2b', 1.4 * s);
      const qx = x + 22 * s, qy = y + 4 * s;
      // quiver body — a narrow cylinder
      ctx.beginPath();
      ctx.moveTo(qx - 3 * s, qy - 14 * s);
      ctx.lineTo(qx + 3 * s, qy - 14 * s);
      ctx.lineTo(qx + 3 * s, qy + 10 * s);
      ctx.lineTo(qx - 3 * s, qy + 10 * s);
      ctx.closePath(); ctx.stroke();
      // arrow shafts poking out the top
      for (let i = -2; i <= 2; i += 2) {
        roughLine(ctx, qx + i * s, qy - 14 * s, qx + i * s, qy - 22 * s, 1);
        // arrowhead
        roughLine(ctx, qx + i * s, qy - 22 * s, qx + (i - 1) * s, qy - 19 * s, 0.8);
        roughLine(ctx, qx + i * s, qy - 22 * s, qx + (i + 1) * s, qy - 19 * s, 0.8);
      }
      // strap across chest
      roughLine(ctx, qx - 3 * s, qy - 10 * s, x + 2 * s, y - 22 * s, 1);
    }

    // ---- SPELLBOOK AT BELT (right hip, only if not carrying a quiver too) ----
    // A small tome clipped to the belt — shows the player is a spell user at a glance.
    if (carry.hasSpellbookAtBelt && !carry.hasQuiver && !isTwoHanded) {
      setPencilStyle(ctx, '#6a4fa0', 1.4 * s);
      const tx = x + 18 * s, ty = y + 8 * s;
      // book cover
      ctx.beginPath();
      ctx.moveTo(tx - 4 * s, ty - 6 * s);
      ctx.lineTo(tx + 4 * s, ty - 7 * s);
      ctx.lineTo(tx + 4 * s, ty + 6 * s);
      ctx.lineTo(tx - 4 * s, ty + 7 * s);
      ctx.closePath(); ctx.stroke();
      // spine
      roughLine(ctx, tx - 4 * s, ty - 6 * s, tx - 4 * s, ty + 7 * s, 1.2);
      // page lines
      roughLine(ctx, tx - 2 * s, ty - 2 * s, tx + 2 * s, ty - 3 * s, 0.8);
      roughLine(ctx, tx - 2 * s, ty + 1 * s, tx + 2 * s, ty, 0.8);
      // small sparkle above to read as magical
      setPencilStyle(ctx, '#9a7fd0', 1 * s);
      roughLine(ctx, tx - 1 * s, ty - 9 * s, tx + 1 * s, ty - 12 * s, 0.8);
      roughLine(ctx, tx + 1 * s, ty - 9 * s, tx - 1 * s, ty - 12 * s, 0.8);
    }

    // ---- BOMB AT BELT (right hip when carrying thrown/damage consumables) ----
    if (carry.hasBombAtBelt && !carry.hasQuiver && !carry.hasSpellbookAtBelt) {
      setPencilStyle(ctx, '#2b2b2b', 1.4 * s);
      const bmx = x + 18 * s, bmy = y + 10 * s;
      roughCircle(ctx, bmx, bmy, 4 * s, 8); // round bomb body
      roughLine(ctx, bmx, bmy - 4 * s, bmx + 1 * s, bmy - 8 * s, 1); // fuse
      // fuse curl
      ctx.beginPath();
      ctx.arc(bmx + 2 * s, bmy - 8 * s, 2 * s, Math.PI, 0); ctx.stroke();
    }
  }

  function drawCharacter(ctx, x, y, scale, gender, equipped, heldItem) {
    // Check for a fully-equipped player sprite first (artist can supply one image per gender).
    // If that exists it replaces the whole composite. If only the bare base sprite exists,
    // it replaces the base and the equipment overlays still draw on top.
    const equippedKey = gender === 'female' ? 'player_female_equipped' : 'player_male_equipped';
    const baseKey     = gender === 'female' ? 'player_female'          : 'player_male';
    const assetW = 60 * scale, assetH = 110 * scale;

    if (_drawAsset(ctx, equippedKey, x, y - assetH * 0.15, assetW, assetH)) {
      // Full equipped sprite supplied — skip all overlays, just draw held-item glow and carried items
      const isTwoHanded = equipped.weapon && equipped.weapon.handed === 'two';
      if (heldItem === 'spell') drawSpellCastOverlay(ctx, x, y, scale, isTwoHanded);
      else if (heldItem === 'potion') drawPotionHeldOverlay(ctx, x, y, scale, isTwoHanded);
      drawCarriedItems(ctx, x, y, scale, equipped.carry, isTwoHanded);
      return;
    }

    // No full equipped sprite — try bare base + procedural equipment overlays
    if (!_drawAsset(ctx, baseKey, x, y - assetH * 0.15, assetW, assetH)) {
      // No base sprite either — full procedural path
      if (equipped.back) drawBackOverlay(ctx, x, y, scale, equipped.back.id.includes('pack'));
      drawPlayerBase(ctx, x, y, scale, gender);
    }
    // Equipment overlays still draw on top of either a base sprite or the procedural base
    if (equipped.chest) drawChestOverlay(ctx, x, y, scale);
    if (equipped.boots) drawBootsOverlay(ctx, x, y, scale);
    if (equipped.helmet) drawHelmetOverlay(ctx, x, y, scale);
    if (equipped.weapon) drawWeaponOverlay(ctx, x, y, scale, equipped.weapon.weaponClass, equipped.weapon.handed);
    if (equipped.offhand) drawOffhandOverlay(ctx, x, y, scale, equipped.offhand.id.includes('shield'));
    drawAccessoryIcons(ctx, x, y, scale, !!(equipped.ring1 || equipped.ring2), !!equipped.amulet);
    const isTwoHanded = equipped.weapon && equipped.weapon.handed === 'two';
    if (heldItem === 'spell') drawSpellCastOverlay(ctx, x, y, scale, isTwoHanded);
    else if (heldItem === 'potion') drawPotionHeldOverlay(ctx, x, y, scale, isTwoHanded);
    // Always draw carried-item layer last so belt items sit on top of armour
    drawCarriedItems(ctx, x, y, scale, equipped.carry, isTwoHanded);
  }

  // ---- ENEMY SKETCHES ----
  const enemyDrawers = {
    slime(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2);
      ctx.beginPath();
      ctx.moveTo(x - 20 * s, y + 10 * s);
      ctx.quadraticCurveTo(x - 22 * s, y - 14 * s, x, y - 18 * s);
      ctx.quadraticCurveTo(x + 22 * s, y - 14 * s, x + 20 * s, y + 10 * s);
      ctx.quadraticCurveTo(x, y + 22 * s, x - 20 * s, y + 10 * s);
      ctx.stroke();
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(x - 6 * s, y, 1.5 * s, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 6 * s, y, 1.5 * s, 0, 7); ctx.fill();
    },
    bat(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2);
      roughCircle(ctx, x, y, 10 * s, 10);
      roughLine(ctx, x - 10 * s, y, x - 32 * s, y - 12 * s, 3);
      roughLine(ctx, x - 32 * s, y - 12 * s, x - 14 * s, y + 4 * s, 3);
      roughLine(ctx, x + 10 * s, y, x + 32 * s, y - 12 * s, 3);
      roughLine(ctx, x + 32 * s, y - 12 * s, x + 14 * s, y + 4 * s, 3);
    },
    goblin(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.2);
      roughCircle(ctx, x, y - 18 * s, 14 * s, 14);
      roughLine(ctx, x, y - 4 * s, x, y + 24 * s, 3);
      roughLine(ctx, x - 14 * s, y - 24 * s, x - 22 * s, y - 30 * s, 2);
      roughLine(ctx, x + 14 * s, y - 24 * s, x + 22 * s, y - 30 * s, 2);
      roughLine(ctx, x - 8 * s, y, x - 20 * s, y + 16 * s, 2);
      roughLine(ctx, x + 8 * s, y, x + 20 * s, y + 16 * s, 2);
    },
    wolf(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.2);
      roughLine(ctx, x - 26 * s, y + 6 * s, x + 20 * s, y + 6 * s, 3);
      roughCircle(ctx, x + 24 * s, y - 2 * s, 10 * s, 10);
      roughLine(ctx, x + 30 * s, y - 10 * s, x + 36 * s, y - 18 * s, 2);
      for (let i = 0; i < 4; i++) roughLine(ctx, x - 20 * s + i * 12 * s, y + 6 * s, x - 20 * s + i * 12 * s, y + 22 * s, 2);
    },
    skeleton(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2);
      roughCircle(ctx, x, y - 24 * s, 11 * s, 12);
      roughLine(ctx, x, y - 13 * s, x, y + 18 * s, 2);
      for (let i = -2; i <= 2; i++) roughLine(ctx, x - 10 * s, y - 4 * s + i * 5 * s, x + 10 * s, y - 4 * s + i * 5 * s, 1.5);
      roughLine(ctx, x - 10 * s, y + 18 * s, x - 16 * s, y + 36 * s, 2);
      roughLine(ctx, x + 10 * s, y + 18 * s, x + 16 * s, y + 36 * s, 2);
    },
    bandit(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.2);
      roughCircle(ctx, x, y - 26 * s, 13 * s, 12);
      roughLine(ctx, x - 13 * s, y - 30 * s, x + 13 * s, y - 30 * s, 2); // bandana
      roughLine(ctx, x, y - 13 * s, x, y + 16 * s, 3);
      roughLine(ctx, x - 14 * s, y - 6 * s, x + 14 * s, y - 6 * s, 2);
      roughLine(ctx, x - 8 * s, y + 16 * s, x - 12 * s, y + 36 * s, 2);
      roughLine(ctx, x + 8 * s, y + 16 * s, x + 12 * s, y + 36 * s, 2);
    },
    spider(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2);
      roughCircle(ctx, x, y, 12 * s, 10);
      for (let i = 0; i < 4; i++) {
        const ang = (i / 4) * Math.PI - Math.PI / 2;
        roughLine(ctx, x - 8 * s, y, x - 8 * s - 18 * s * Math.cos(ang), y + 18 * s * Math.sin(ang) - 8 * s, 2);
        roughLine(ctx, x + 8 * s, y, x + 8 * s + 18 * s * Math.cos(ang), y + 18 * s * Math.sin(ang) - 8 * s, 2);
      }
    },
    ghost(ctx, x, y, s) {
      setPencilStyle(ctx, '#444', 2);
      ctx.beginPath();
      ctx.moveTo(x - 16 * s, y + 20 * s);
      ctx.quadraticCurveTo(x - 18 * s, y - 18 * s, x, y - 20 * s);
      ctx.quadraticCurveTo(x + 18 * s, y - 18 * s, x + 16 * s, y + 20 * s);
      for (let i = 0; i < 3; i++) {
        ctx.lineTo(x + 16 * s - (i + 1) * (10.6 * s), y + 12 * s);
        ctx.lineTo(x + 16 * s - (i + 1.5) * (10.6 * s), y + 20 * s);
      }
      ctx.stroke();
    },
    ogre(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.6);
      roughCircle(ctx, x, y - 30 * s, 18 * s, 14);
      roughLine(ctx, x, y - 12 * s, x, y + 26 * s, 5);
      roughLine(ctx, x - 24 * s, y - 4 * s, x + 24 * s, y - 4 * s, 4);
      roughLine(ctx, x - 8 * s, y + 26 * s, x - 14 * s, y + 50 * s, 4);
      roughLine(ctx, x + 8 * s, y + 26 * s, x + 14 * s, y + 50 * s, 4);
      // tusks
      roughLine(ctx, x - 6 * s, y - 24 * s, x - 9 * s, y - 16 * s, 2);
      roughLine(ctx, x + 6 * s, y - 24 * s, x + 9 * s, y - 16 * s, 2);
    },
    troll(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.8);
      roughCircle(ctx, x, y - 34 * s, 20 * s, 14);
      roughLine(ctx, x, y - 14 * s, x, y + 30 * s, 6);
      roughLine(ctx, x - 28 * s, y - 6 * s, x + 28 * s, y - 6 * s, 5);
      roughLine(ctx, x - 14 * s, y + 30 * s, x - 22 * s, y + 56 * s, 5);
      roughLine(ctx, x + 14 * s, y + 30 * s, x + 22 * s, y + 56 * s, 5);
    },
    wraith(ctx, x, y, s) {
      setPencilStyle(ctx, '#222', 2.4);
      ctx.beginPath();
      ctx.moveTo(x - 20 * s, y + 30 * s);
      ctx.quadraticCurveTo(x - 24 * s, y - 24 * s, x, y - 28 * s);
      ctx.quadraticCurveTo(x + 24 * s, y - 24 * s, x + 20 * s, y + 30 * s);
      ctx.stroke();
      ctx.fillStyle = '#222';
      ctx.beginPath(); ctx.arc(x - 6 * s, y - 6 * s, 2 * s, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 6 * s, y - 6 * s, 2 * s, 0, 7); ctx.fill();
    },
    dragon(ctx, x, y, s) {
      setPencilStyle(ctx, '#222', 2.8);
      roughCircle(ctx, x + 16 * s, y - 20 * s, 14 * s, 12);
      roughLine(ctx, x + 16 * s, y - 6 * s, x - 20 * s, y + 10 * s, 6);
      roughLine(ctx, x - 4 * s, y - 4 * s, x - 4 * s, y - 36 * s, 3);
      roughLine(ctx, x - 4 * s, y - 36 * s, x - 24 * s, y - 24 * s, 3);
      roughLine(ctx, x - 20 * s, y + 10 * s, x - 36 * s, y + 6 * s, 3);
      roughLine(ctx, x - 6 * s, y + 8 * s, x - 8 * s, y + 30 * s, 3);
      roughLine(ctx, x + 4 * s, y + 4 * s, x + 8 * s, y + 28 * s, 3);
    },
    zombie(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.2);
      roughCircle(ctx, x, y - 26 * s, 13 * s, 12); // head
      roughLine(ctx, x, y - 13 * s, x, y + 18 * s, 3); // body
      // arms raised forward (zombie pose)
      roughLine(ctx, x - 14 * s, y - 8 * s, x - 28 * s, y - 18 * s, 2);
      roughLine(ctx, x + 14 * s, y - 8 * s, x + 28 * s, y - 18 * s, 2);
      roughLine(ctx, x - 8 * s, y + 18 * s, x - 12 * s, y + 36 * s, 2);
      roughLine(ctx, x + 8 * s, y + 18 * s, x + 12 * s, y + 36 * s, 2);
      // X eyes
      roughLine(ctx, x - 8 * s, y - 30 * s, x - 4 * s, y - 26 * s, 1.5);
      roughLine(ctx, x - 4 * s, y - 30 * s, x - 8 * s, y - 26 * s, 1.5);
    },
    lizardman(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.2);
      // slightly elongated head with snout
      ctx.beginPath();
      ctx.moveTo(x - 12 * s, y - 28 * s);
      ctx.lineTo(x + 12 * s, y - 28 * s);
      ctx.lineTo(x + 18 * s, y - 20 * s);
      ctx.lineTo(x + 12 * s, y - 14 * s);
      ctx.lineTo(x - 12 * s, y - 14 * s);
      ctx.closePath(); ctx.stroke();
      roughLine(ctx, x, y - 14 * s, x, y + 18 * s, 3);
      roughLine(ctx, x - 14 * s, y - 4 * s, x + 14 * s, y - 4 * s, 2);
      roughLine(ctx, x - 8 * s, y + 18 * s, x - 12 * s, y + 36 * s, 2);
      roughLine(ctx, x + 8 * s, y + 18 * s, x + 12 * s, y + 36 * s, 2);
      // tail
      roughLine(ctx, x - 4 * s, y + 14 * s, x - 20 * s, y + 30 * s, 2);
    },
    orc(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.6);
      roughCircle(ctx, x, y - 26 * s, 16 * s, 12); // big head
      roughLine(ctx, x, y - 10 * s, x, y + 22 * s, 4); // burly body
      roughLine(ctx, x - 18 * s, y - 4 * s, x + 18 * s, y - 4 * s, 3); // wide shoulders
      roughLine(ctx, x - 8 * s, y + 22 * s, x - 14 * s, y + 42 * s, 3);
      roughLine(ctx, x + 8 * s, y + 22 * s, x + 14 * s, y + 42 * s, 3);
      // tusks
      roughLine(ctx, x - 4 * s, y - 20 * s, x - 7 * s, y - 13 * s, 2);
      roughLine(ctx, x + 4 * s, y - 20 * s, x + 7 * s, y - 13 * s, 2);
    },
    cultist(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.2);
      roughCircle(ctx, x, y - 26 * s, 12 * s, 12);
      // hood lines
      roughLine(ctx, x - 12 * s, y - 30 * s, x - 8 * s, y - 14 * s, 1.8);
      roughLine(ctx, x + 12 * s, y - 30 * s, x + 8 * s, y - 14 * s, 1.8);
      roughLine(ctx, x, y - 14 * s, x, y + 18 * s, 3);
      roughLine(ctx, x - 12 * s, y - 4 * s, x + 12 * s, y - 4 * s, 1.8);
      roughLine(ctx, x - 6 * s, y + 18 * s, x - 8 * s, y + 36 * s, 2);
      roughLine(ctx, x + 6 * s, y + 18 * s, x + 8 * s, y + 36 * s, 2);
      // held symbol
      roughCircle(ctx, x + 18 * s, y + 4 * s, 6 * s, 8);
    },
    imp(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2);
      roughCircle(ctx, x, y - 18 * s, 12 * s, 10); // head
      // horns
      roughLine(ctx, x - 8 * s, y - 28 * s, x - 12 * s, y - 38 * s, 2);
      roughLine(ctx, x + 8 * s, y - 28 * s, x + 12 * s, y - 38 * s, 2);
      roughLine(ctx, x, y - 6 * s, x, y + 14 * s, 2.4);
      // bat wings
      roughLine(ctx, x - 6 * s, y - 4 * s, x - 24 * s, y - 16 * s, 2);
      roughLine(ctx, x - 24 * s, y - 16 * s, x - 12 * s, y + 4 * s, 2);
      roughLine(ctx, x + 6 * s, y - 4 * s, x + 24 * s, y - 16 * s, 2);
      roughLine(ctx, x + 24 * s, y - 16 * s, x + 12 * s, y + 4 * s, 2);
      roughLine(ctx, x - 4 * s, y + 14 * s, x - 6 * s, y + 28 * s, 2);
      roughLine(ctx, x + 4 * s, y + 14 * s, x + 6 * s, y + 28 * s, 2);
    },
    wisp(ctx, x, y, s) {
      setPencilStyle(ctx, '#444', 2);
      // glowing orb
      roughCircle(ctx, x, y, 14 * s, 12);
      // inner core
      roughCircle(ctx, x, y, 7 * s, 8);
      // trailing wisps
      roughLine(ctx, x - 6 * s, y + 12 * s, x - 10 * s, y + 28 * s, 1.5);
      roughLine(ctx, x, y + 14 * s, x + 2 * s, y + 30 * s, 1.5);
      roughLine(ctx, x + 6 * s, y + 12 * s, x + 10 * s, y + 28 * s, 1.5);
    },
    harpy(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.2);
      roughCircle(ctx, x, y - 22 * s, 11 * s, 10); // head
      roughLine(ctx, x, y - 11 * s, x, y + 16 * s, 2.5); // body
      // wings instead of arms
      roughLine(ctx, x - 11 * s, y - 8 * s, x - 32 * s, y - 22 * s, 2.5);
      roughLine(ctx, x - 32 * s, y - 22 * s, x - 18 * s, y + 4 * s, 2);
      roughLine(ctx, x + 11 * s, y - 8 * s, x + 32 * s, y - 22 * s, 2.5);
      roughLine(ctx, x + 32 * s, y - 22 * s, x + 18 * s, y + 4 * s, 2);
      // taloned legs
      roughLine(ctx, x - 6 * s, y + 16 * s, x - 8 * s, y + 36 * s, 2);
      roughLine(ctx, x + 6 * s, y + 16 * s, x + 8 * s, y + 36 * s, 2);
    },
    gargoyle(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.6);
      roughCircle(ctx, x, y - 24 * s, 14 * s, 10); // head
      roughLine(ctx, x, y - 10 * s, x, y + 20 * s, 3.5); // stocky body
      roughLine(ctx, x - 16 * s, y - 4 * s, x + 16 * s, y - 4 * s, 3); // shoulders
      // stone wings folded
      roughLine(ctx, x - 16 * s, y - 4 * s, x - 24 * s, y + 16 * s, 2.5);
      roughLine(ctx, x + 16 * s, y - 4 * s, x + 24 * s, y + 16 * s, 2.5);
      roughLine(ctx, x - 24 * s, y + 16 * s, x - 10 * s, y + 22 * s, 2);
      roughLine(ctx, x + 24 * s, y + 16 * s, x + 10 * s, y + 22 * s, 2);
      roughLine(ctx, x - 6 * s, y + 20 * s, x - 10 * s, y + 40 * s, 3);
      roughLine(ctx, x + 6 * s, y + 20 * s, x + 10 * s, y + 40 * s, 3);
    },
    necromancer(ctx, x, y, s) {
      setPencilStyle(ctx, '#222', 2.2);
      roughCircle(ctx, x, y - 26 * s, 12 * s, 12);
      roughLine(ctx, x - 12 * s, y - 30 * s, x + 12 * s, y - 30 * s, 1.6); // wide brim hat
      roughLine(ctx, x - 6 * s, y - 30 * s, x - 4 * s, y - 44 * s, 1.8); // hat top
      roughLine(ctx, x + 6 * s, y - 30 * s, x + 4 * s, y - 44 * s, 1.8);
      roughLine(ctx, x - 4 * s, y - 44 * s, x + 4 * s, y - 44 * s, 1.6);
      roughLine(ctx, x, y - 14 * s, x, y + 16 * s, 2.4);
      roughLine(ctx, x - 10 * s, y - 4 * s, x + 10 * s, y - 4 * s, 1.8);
      roughLine(ctx, x - 4 * s, y + 16 * s, x - 6 * s, y + 34 * s, 2);
      roughLine(ctx, x + 4 * s, y + 16 * s, x + 6 * s, y + 34 * s, 2);
      // raised staff
      roughLine(ctx, x + 14 * s, y + 12 * s, x + 18 * s, y - 30 * s, 2);
      roughCircle(ctx, x + 18 * s, y - 34 * s, 5 * s, 8);
    },
    dark_knight(ctx, x, y, s) {
      setPencilStyle(ctx, '#222', 2.6);
      roughCircle(ctx, x, y - 26 * s, 14 * s, 12); // helmed head
      // visor line
      roughLine(ctx, x - 10 * s, y - 22 * s, x + 10 * s, y - 22 * s, 1.8);
      roughLine(ctx, x, y - 12 * s, x, y + 22 * s, 4); // armored body
      roughLine(ctx, x - 18 * s, y - 4 * s, x + 18 * s, y - 4 * s, 3); // pauldrons
      // sword arm raised
      roughLine(ctx, x + 18 * s, y - 4 * s, x + 28 * s, y - 22 * s, 2.4);
      roughLine(ctx, x + 28 * s, y - 22 * s, x + 36 * s, y - 36 * s, 2);
      roughLine(ctx, x - 8 * s, y + 22 * s, x - 12 * s, y + 44 * s, 3);
      roughLine(ctx, x + 8 * s, y + 22 * s, x + 12 * s, y + 44 * s, 3);
    },
    mimic(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.4);
      // treasure chest body
      ctx.beginPath();
      ctx.moveTo(x - 22 * s, y - 8 * s);
      ctx.lineTo(x + 22 * s, y - 8 * s);
      ctx.lineTo(x + 22 * s, y + 20 * s);
      ctx.lineTo(x - 22 * s, y + 20 * s);
      ctx.closePath(); ctx.stroke();
      // lid (open, with teeth)
      ctx.beginPath();
      ctx.moveTo(x - 22 * s, y - 8 * s);
      ctx.lineTo(x - 22 * s, y - 24 * s);
      ctx.lineTo(x + 22 * s, y - 24 * s);
      ctx.lineTo(x + 22 * s, y - 8 * s);
      ctx.stroke();
      // jagged teeth
      for (let i = 0; i < 5; i++) {
        const tx = x - 18 * s + i * 9 * s;
        roughLine(ctx, tx, y - 8 * s, tx + 4 * s, y, 1.6);
      }
      // eyes on lid
      ctx.fillStyle = '#333';
      ctx.beginPath(); ctx.arc(x - 8 * s, y - 18 * s, 3 * s, 0, 7); ctx.fill();
      ctx.beginPath(); ctx.arc(x + 8 * s, y - 18 * s, 3 * s, 0, 7); ctx.fill();
    }
  };

  function drawEnemy(ctx, x, y, scale, sketchId) {
    // Asset images are drawn at a fixed size in canvas units; scale maps to roughly 60x80px.
    // The procedural sketches are drawn centered on (x, y) spanning roughly ±40x±50 units,
    // so we match that footprint for the asset replacement.
    const assetW = 80 * scale, assetH = 100 * scale;
    if (_drawAsset(ctx, sketchId, x, y - assetH * 0.1, assetW, assetH)) return;
    const fn = enemyDrawers[sketchId] || enemyDrawers.goblin;
    fn(ctx, x, y, scale);
  }

  // ---- Notebook paper background ----
  function drawNotebookBg(ctx, w, h) {
    if (_drawBg(ctx, 'bg_notebook', w, h)) return;
    ctx.fillStyle = '#fdfcf5';
    ctx.fillRect(0, 0, w, h);
    ctx.strokeStyle = '#cfd8e8';
    ctx.lineWidth = 1;
    for (let yy = 30; yy < h; yy += 26) {
      ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(w, yy); ctx.stroke();
    }
    ctx.strokeStyle = '#e8a9a9';
    ctx.beginPath(); ctx.moveTo(40, 0); ctx.lineTo(40, h); ctx.stroke();
  }

  // ---- HAND-LETTERED TEXT ----
  // Draws text using the pencil/handwriting font with slight per-call jitter for a "written" look.
  function handText(ctx, text, x, y, opts = {}) {
    const size = opts.size || 16;
    const color = opts.color || '#222';
    const align = opts.align || 'center';
    ctx.save();
    ctx.font = `${size}px "Patrick Hand", "Architects Daughter", cursive, sans-serif`;
    ctx.fillStyle = color;
    ctx.textAlign = align;
    ctx.textBaseline = opts.baseline || 'alphabetic';
    // very slight rotation jitter sells the "handwritten" feel without hurting legibility
    const angle = jitter(0.03);
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  // Underline-style scribble used under hand-lettered labels (e.g. HP readouts)
  function scribbleUnderline(ctx, x, y, w, color = '#888') {
    setPencilStyle(ctx, color, 1.2);
    roughLine(ctx, x - w / 2, y, x + w / 2, y, 3);
  }

  // ---- ITEM ICONS ----
  // Small (default 64x64-ish) standalone icon drawings for shop/inventory/loot display.
  const itemIconDrawers = {
    // weapons by class
    sword(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.2 * s);
      roughLine(ctx, x - 4 * s, y + 18 * s, x + 10 * s, y - 20 * s, 3);
      roughLine(ctx, x - 8 * s, y + 6 * s, x + 6 * s, y + 10 * s, 2); // crossguard
      roughLine(ctx, x - 6 * s, y + 14 * s, x - 2 * s, y + 22 * s, 2); // hilt
    },
    // shortsword - shorter blade, guard visible
    shortsword(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      roughLine(ctx, x - 2 * s, y + 14 * s, x + 6 * s, y - 12 * s, 2.4);
      roughLine(ctx, x - 8 * s, y + 4 * s, x + 4 * s, y + 8 * s, 1.8); // guard
      roughLine(ctx, x - 5 * s, y + 12 * s, x - 2 * s, y + 18 * s, 1.6); // grip
    },
    // longsword - taller than sword, elegant taper
    longsword(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.2 * s);
      roughLine(ctx, x - 3 * s, y + 22 * s, x + 8 * s, y - 24 * s, 2.8);
      roughLine(ctx, x - 10 * s, y + 8 * s, x + 8 * s, y + 12 * s, 1.8);
      roughLine(ctx, x - 6 * s, y + 18 * s, x - 2 * s, y + 28 * s, 1.8);
    },
    // greatsword - massive, wide blade, two-hand grip
    greatsword(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.8 * s);
      roughLine(ctx, x - 4 * s, y + 26 * s, x + 10 * s, y - 28 * s, 3.5);
      roughLine(ctx, x - 14 * s, y + 4 * s, x + 10 * s, y + 10 * s, 2);
      roughLine(ctx, x - 6 * s, y + 20 * s, x - 2 * s, y + 32 * s, 2.2); // long grip
    },
    // greataxe - wide brutal head, long handle
    greataxe(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.6 * s);
      roughLine(ctx, x - 4 * s, y + 26 * s, x + 8 * s, y - 22 * s, 3.5); // haft
      ctx.beginPath();
      ctx.moveTo(x + 8 * s, y - 22 * s);
      ctx.lineTo(x + 28 * s, y - 10 * s);
      ctx.lineTo(x + 6 * s, y + 4 * s);
      ctx.closePath(); ctx.stroke();
      ctx.beginPath(); // second blade back
      ctx.moveTo(x + 6 * s, y - 18 * s);
      ctx.lineTo(x - 14 * s, y - 8 * s);
      ctx.lineTo(x + 4 * s, y, x + 4 * s, y); // closes near haft
      ctx.stroke();
    },
    // mace - round head, short handle
    mace(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.4 * s);
      roughLine(ctx, x - 2 * s, y + 20 * s, x + 4 * s, y - 6 * s, 3);
      roughCircle(ctx, x + 6 * s, y - 12 * s, 11 * s, 10);
      // flanges
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * Math.PI * 2;
        roughLine(ctx, x + 6 * s + 8 * s * Math.cos(a), y - 12 * s + 8 * s * Math.sin(a),
                       x + 6 * s + 14 * s * Math.cos(a), y - 12 * s + 14 * s * Math.sin(a), 1.5);
      }
    },
    // greatmace - larger hammer/mace, same as hammer
    greatmace(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.8 * s);
      roughLine(ctx, x - 4 * s, y + 22 * s, x + 4 * s, y - 14 * s, 4);
      roughCircle(ctx, x + 6 * s, y - 20 * s, 12 * s, 10);
    },
    // shortbow - small, curved
    shortbow(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      ctx.beginPath();
      ctx.arc(x, y, 14 * s, -Math.PI * 0.8, Math.PI * 0.8);
      ctx.stroke();
      roughLine(ctx, x + 14 * s * Math.cos(-Math.PI * 0.8), y + 14 * s * Math.sin(-Math.PI * 0.8),
                     x + 14 * s * Math.cos(Math.PI * 0.8), y + 14 * s * Math.sin(Math.PI * 0.8), 1.4);
    },
    // crossbow - horizontal stock, visible prod
    crossbow(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      // stock (horizontal)
      roughLine(ctx, x - 20 * s, y + 4 * s, x + 20 * s, y + 4 * s, 3.5);
      // prod (the bow part, vertical)
      roughLine(ctx, x - 2 * s, y - 16 * s, x - 2 * s, y + 4 * s, 1.6);
      ctx.beginPath();
      ctx.arc(x - 2 * s, y - 16 * s, 10 * s, 0, Math.PI * 2);
      ctx.stroke();
      // trigger guard
      roughLine(ctx, x + 4 * s, y + 4 * s, x + 16 * s, y + 4 * s, 1.4);
      roughLine(ctx, x + 16 * s, y + 4 * s, x + 16 * s, y + 14 * s, 1.4);
      roughLine(ctx, x + 4 * s, y + 4 * s, x + 4 * s, y + 14 * s, 1.4);
    },
    // spear - long shaft with pointy tip
    spear(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.2 * s);
      roughLine(ctx, x - 4 * s, y + 26 * s, x + 4 * s, y - 20 * s, 3);
      // spearhead triangle
      ctx.beginPath();
      ctx.moveTo(x + 2 * s, y - 20 * s);
      ctx.lineTo(x + 10 * s, y - 30 * s);
      ctx.lineTo(x + 18 * s, y - 20 * s);
      ctx.closePath(); ctx.stroke();
    },
    // greatspear - spear icon but longer
    greatspear(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.4 * s);
      roughLine(ctx, x - 6 * s, y + 28 * s, x + 6 * s, y - 24 * s, 3.5);
      ctx.beginPath();
      ctx.moveTo(x + 4 * s, y - 24 * s);
      ctx.lineTo(x + 14 * s, y - 36 * s);
      ctx.lineTo(x + 24 * s, y - 24 * s);
      ctx.closePath(); ctx.stroke();
    },
    dagger(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      roughLine(ctx, x - 2 * s, y + 12 * s, x + 4 * s, y - 10 * s, 2);
      roughLine(ctx, x - 5 * s, y + 8 * s, x + 1 * s, y + 11 * s, 1.6);
    },
    axe(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.4 * s);
      roughLine(ctx, x - 2 * s, y + 20 * s, x + 6 * s, y - 18 * s, 3);
      ctx.beginPath();
      ctx.moveTo(x + 6 * s, y - 18 * s);
      ctx.lineTo(x + 22 * s, y - 10 * s);
      ctx.lineTo(x + 4 * s, y - 2 * s);
      ctx.closePath();
      ctx.stroke();
    },
    spear(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.2 * s);
      roughLine(ctx, x - 6 * s, y + 22 * s, x + 8 * s, y - 24 * s, 4);
      roughLine(ctx, x + 3 * s, y - 18 * s, x + 12 * s, y - 26 * s, 2);
      roughLine(ctx, x + 12 * s, y - 18 * s, x + 12 * s, y - 26 * s, 2);
    },
    hammer(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.6 * s);
      roughLine(ctx, x - 4 * s, y + 20 * s, x + 4 * s, y - 14 * s, 4);
      roughCircle(ctx, x + 5 * s, y - 18 * s, 9 * s, 10);
    },
    bow(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      roughCircle(ctx, x, y, 18 * s, 14);
      roughLine(ctx, x + 18 * s, y, x - 18 * s, y, 1.6);
    },
    staff(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.2 * s);
      roughLine(ctx, x - 4 * s, y + 22 * s, x + 4 * s, y - 20 * s, 3);
      roughCircle(ctx, x + 5 * s, y - 24 * s, 6 * s, 10);
    },
    wand(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      roughLine(ctx, x - 2 * s, y + 14 * s, x + 2 * s, y - 12 * s, 2.4);
      setPencilStyle(ctx, '#9a7fd0', 1.4 * s);
      roughLine(ctx, x + 1 * s, y - 14 * s, x + 5 * s, y - 19 * s, 1.2);
      roughLine(ctx, x + 5 * s, y - 14 * s, x + 1 * s, y - 19 * s, 1.2);
    },
    // offhand
    shield(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.2 * s);
      ctx.beginPath();
      ctx.moveTo(x, y - 18 * s);
      ctx.lineTo(x - 14 * s, y - 8 * s);
      ctx.lineTo(x - 14 * s, y + 10 * s);
      ctx.lineTo(x, y + 20 * s);
      ctx.lineTo(x + 14 * s, y + 10 * s);
      ctx.lineTo(x + 14 * s, y - 8 * s);
      ctx.closePath();
      ctx.stroke();
      roughLine(ctx, x, y - 14 * s, x, y + 14 * s, 1.4);
    },
    torch(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      roughLine(ctx, x, y + 18 * s, x, y - 10 * s, 3);
      roughCircle(ctx, x, y - 16 * s, 6 * s, 8);
    },
    // armor
    helmet(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.2 * s);
      ctx.beginPath();
      ctx.arc(x, y, 16 * s, Math.PI, 0, false);
      ctx.stroke();
      roughLine(ctx, x - 16 * s, y, x + 16 * s, y, 2);
      roughLine(ctx, x - 4 * s, y, x - 4 * s, y + 8 * s, 1.4);
    },
    chest(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2.2 * s);
      ctx.beginPath();
      ctx.moveTo(x - 14 * s, y - 16 * s);
      ctx.lineTo(x + 14 * s, y - 16 * s);
      ctx.lineTo(x + 10 * s, y + 18 * s);
      ctx.lineTo(x - 10 * s, y + 18 * s);
      ctx.closePath();
      ctx.stroke();
      roughLine(ctx, x, y - 14 * s, x, y + 16 * s, 1.4);
    },
    boots(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      roughLine(ctx, x - 8 * s, y - 14 * s, x - 8 * s, y + 8 * s, 2);
      roughLine(ctx, x - 8 * s, y + 8 * s, x + 10 * s, y + 12 * s, 2);
      roughLine(ctx, x + 10 * s, y + 12 * s, x + 10 * s, y + 16 * s, 2);
      roughLine(ctx, x - 8 * s, y + 14 * s, x + 10 * s, y + 16 * s, 1.6);
    },
    ring(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      roughCircle(ctx, x, y, 10 * s, 12);
      roughCircle(ctx, x, y - 10 * s, 3 * s, 8);
    },
    amulet(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      ctx.beginPath();
      ctx.moveTo(x - 10 * s, y - 14 * s);
      ctx.lineTo(x + 10 * s, y - 14 * s);
      ctx.stroke();
      roughLine(ctx, x - 10 * s, y - 14 * s, x, y - 6 * s, 1.4);
      roughLine(ctx, x + 10 * s, y - 14 * s, x, y - 6 * s, 1.4);
      roughCircle(ctx, x, y + 4 * s, 8 * s, 10);
    },
    // consumables
    potion(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      ctx.beginPath();
      ctx.moveTo(x - 8 * s, y - 4 * s);
      ctx.quadraticCurveTo(x - 10 * s, y + 18 * s, x, y + 20 * s);
      ctx.quadraticCurveTo(x + 10 * s, y + 18 * s, x + 8 * s, y - 4 * s);
      ctx.closePath();
      ctx.stroke();
      roughLine(ctx, x - 4 * s, y - 4 * s, x - 4 * s, y - 14 * s, 1.6);
      roughLine(ctx, x + 4 * s, y - 4 * s, x + 4 * s, y - 14 * s, 1.6);
      roughLine(ctx, x - 5 * s, y - 14 * s, x + 5 * s, y - 14 * s, 1.6);
      // liquid fill squiggle
      roughLine(ctx, x - 6 * s, y + 8 * s, x + 6 * s, y + 8 * s, 1.2);
    },
    ether(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      ctx.beginPath();
      ctx.moveTo(x - 8 * s, y - 4 * s);
      ctx.quadraticCurveTo(x - 10 * s, y + 18 * s, x, y + 20 * s);
      ctx.quadraticCurveTo(x + 10 * s, y + 18 * s, x + 8 * s, y - 4 * s);
      ctx.closePath();
      ctx.stroke();
      roughLine(ctx, x - 4 * s, y - 4 * s, x - 4 * s, y - 14 * s, 1.6);
      roughLine(ctx, x + 4 * s, y - 4 * s, x + 4 * s, y - 14 * s, 1.6);
      roughLine(ctx, x - 5 * s, y - 14 * s, x + 5 * s, y - 14 * s, 1.6);
      // small star/sparkle for magic
      roughLine(ctx, x - 3 * s, y + 6 * s, x + 3 * s, y + 12 * s, 1.2);
      roughLine(ctx, x + 3 * s, y + 6 * s, x - 3 * s, y + 12 * s, 1.2);
    },
    antidote(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      roughCircle(ctx, x, y + 4 * s, 10 * s, 10);
      roughLine(ctx, x - 6 * s, y - 6 * s, x + 6 * s, y - 6 * s, 1.6);
      roughLine(ctx, x, y - 6 * s, x, y - 14 * s, 1.6);
    },
    spellbook(ctx, x, y, s) {
      setPencilStyle(ctx, '#6a4fa0', 1.8 * s);
      ctx.beginPath();
      ctx.moveTo(x - 10 * s, y - 12 * s);
      ctx.lineTo(x + 10 * s, y - 14 * s);
      ctx.lineTo(x + 10 * s, y + 12 * s);
      ctx.lineTo(x - 10 * s, y + 14 * s);
      ctx.closePath();
      ctx.stroke();
      roughLine(ctx, x - 10 * s, y - 12 * s, x - 10 * s, y + 14 * s, 1.4);
      roughLine(ctx, x - 6 * s, y - 7 * s, x + 6 * s, y - 8 * s, 1);
      roughLine(ctx, x - 6 * s, y, x + 6 * s, y - 1 * s, 1);
      setPencilStyle(ctx, '#9a7fd0', 1.2 * s);
      roughLine(ctx, x - 3 * s, y - 22 * s, x + 3 * s, y - 27 * s, 1.2);
      roughLine(ctx, x + 3 * s, y - 22 * s, x - 3 * s, y - 27 * s, 1.2);
    },
    cloak(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 1.8 * s);
      ctx.beginPath();
      ctx.moveTo(x - 8 * s, y - 16 * s);
      ctx.quadraticCurveTo(x - 13 * s, y + 4 * s, x - 8 * s, y + 16 * s);
      ctx.lineTo(x + 8 * s, y + 16 * s);
      ctx.quadraticCurveTo(x + 13 * s, y + 4 * s, x + 8 * s, y - 16 * s);
      ctx.closePath();
      ctx.stroke();
      roughLine(ctx, x - 8 * s, y - 16 * s, x + 8 * s, y - 16 * s, 1.2);
    },
    backpack(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 1.8 * s);
      ctx.beginPath();
      ctx.moveTo(x - 9 * s, y - 14 * s);
      ctx.lineTo(x + 9 * s, y - 14 * s);
      ctx.lineTo(x + 10 * s, y + 14 * s);
      ctx.lineTo(x - 10 * s, y + 14 * s);
      ctx.closePath();
      ctx.stroke();
      roughLine(ctx, x - 8 * s, y - 7 * s, x + 8 * s, y - 7 * s, 1);
      // shoulder straps, to distinguish from a closed book at a glance
      roughLine(ctx, x - 5 * s, y - 14 * s, x - 6 * s, y - 22 * s, 1.2);
      roughLine(ctx, x + 5 * s, y - 14 * s, x + 6 * s, y - 22 * s, 1.2);
      roughCircle(ctx, x, y + 4 * s, 3 * s, 8);
    },
    // quest items
    questitem(ctx, x, y, s) {
      setPencilStyle(ctx, '#2b2b2b', 2 * s);
      ctx.beginPath();
      ctx.moveTo(x - 10 * s, y - 10 * s);
      ctx.lineTo(x + 10 * s, y - 10 * s);
      ctx.lineTo(x + 10 * s, y + 10 * s);
      ctx.lineTo(x - 10 * s, y + 10 * s);
      ctx.closePath();
      ctx.stroke();
      handText(ctx, '?', x, y + 5 * s, { size: 14 * s, color: '#2b2b2b' });
    },
    gold(ctx, x, y, s) {
      setPencilStyle(ctx, '#8a6d00', 2 * s);
      roughCircle(ctx, x, y, 12 * s, 12);
      handText(ctx, 'G', x, y + 5 * s, { size: 14 * s, color: '#8a6d00' });
    }
  };

  // Resolve which icon drawer to use for a given item data object.
  function iconKeyForItem(item) {
    if (item.type === 'weapon') return item.weaponClass || 'sword';
    if (item.type === 'offhand') return item.id.includes('shield') || item.id.includes('ward') || item.id.includes('barrier') || item.id.includes('buckler') ? 'shield' : (item.id.includes('orb') ? 'amulet' : 'torch');
    if (item.type === 'helmet') return 'helmet';
    if (item.type === 'chest') return 'chest';
    if (item.type === 'boots') return 'boots';
    if (item.type === 'back') return item.id.includes('pack') ? 'backpack' : 'cloak';
    if (item.type === 'ring') return 'ring';
    if (item.type === 'amulet') return 'amulet';
    if (item.type === 'quest') return 'questitem';
    if (item.type === 'consumable') {
      if (item.effect && item.effect.heal) return 'potion';
      if (item.effect && item.effect.mana) return 'ether';
      if (item.effect && item.effect.cure) return 'antidote';
      return 'potion';
    }
    if (item.type === 'spellbook') return 'spellbook';
    return 'questitem';
  }

  function drawItemIcon(ctx, x, y, scale, item) {
    const key = iconKeyForItem(item);
    // Icon assets are drawn to fill roughly 80% of the cell around (x, y).
    // scale here comes from drawItemIconCard as Math.min(w,h)/50; a 56px card → scale≈1.12.
    const iconSize = 44 * scale;
    if (_drawAsset(ctx, key, x, y, iconSize, iconSize)) return;
    const fn = itemIconDrawers[key] || itemIconDrawers.questitem;
    fn(ctx, x, y, scale);
  }

  // Standalone canvas-icon renderer: draws a bordered notebook swatch with the item inside.
  function drawItemIconCard(canvas, item) {
    const ctx = canvas.getContext('2d');
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#fffef9';
    ctx.fillRect(0, 0, w, h);
    setPencilStyle(ctx, '#999', 1.4);
    roughLine(ctx, 2, 2, w - 2, 2, 3); roughLine(ctx, w - 2, 2, w - 2, h - 2, 3);
    roughLine(ctx, w - 2, h - 2, 2, h - 2, 3); roughLine(ctx, 2, h - 2, 2, 2, 3);
    drawItemIcon(ctx, w / 2, h / 2, Math.min(w, h) / 50, item);
  }

  // ---- TOWN LOCATION ICONS ----
  const locationIconDrawers = {
    shop(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2 * s);
      // awning + stall
      roughLine(ctx, x - 22 * s, y - 6 * s, x - 22 * s, y + 20 * s, 2);
      roughLine(ctx, x + 22 * s, y - 6 * s, x + 22 * s, y + 20 * s, 2);
      roughLine(ctx, x - 22 * s, y + 20 * s, x + 22 * s, y + 20 * s, 2);
      ctx.beginPath();
      ctx.moveTo(x - 26 * s, y - 6 * s);
      for (let i = 0; i < 5; i++) {
        const xx = x - 26 * s + (i + 0.5) * (52 * s / 5);
        ctx.lineTo(xx, y - 6 * s + (i % 2 === 0 ? -8 * s : 0));
      }
      ctx.lineTo(x + 26 * s, y - 6 * s);
      ctx.stroke();
      roughLine(ctx, x - 26 * s, y - 6 * s, x - 22 * s, y - 16 * s, 2);
      roughLine(ctx, x + 26 * s, y - 6 * s, x + 22 * s, y - 16 * s, 2);
      roughLine(ctx, x - 22 * s, y - 16 * s, x + 22 * s, y - 16 * s, 2);
    },
    blacksmith(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2 * s);
      // anvil
      ctx.beginPath();
      ctx.moveTo(x - 16 * s, y + 14 * s);
      ctx.lineTo(x - 12 * s, y + 2 * s);
      ctx.lineTo(x + 16 * s, y + 2 * s);
      ctx.lineTo(x + 20 * s, y - 4 * s);
      ctx.lineTo(x - 4 * s, y - 4 * s);
      ctx.lineTo(x - 8 * s, y + 14 * s);
      ctx.closePath();
      ctx.stroke();
      roughLine(ctx, x - 2 * s, y - 4 * s, x - 2 * s, y - 16 * s, 2.4);
      roughCircle(ctx, x - 2 * s, y - 20 * s, 4 * s, 8);
      // spark marks
      setPencilStyle(ctx, '#888', 1.4 * s);
      roughLine(ctx, x + 10 * s, y - 14 * s, x + 16 * s, y - 20 * s, 2);
      roughLine(ctx, x + 14 * s, y - 6 * s, x + 22 * s, y - 8 * s, 2);
      roughLine(ctx, x + 8 * s, y - 22 * s, x + 10 * s, y - 28 * s, 2);
    },
    alchemist(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2 * s);
      itemIconDrawers.potion(ctx, x - 8 * s, y + 4 * s, s * 0.8);
      itemIconDrawers.potion(ctx, x + 9 * s, y, s * 0.7);
    },
    inn(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2 * s);
      // bed
      roughLine(ctx, x - 20 * s, y + 16 * s, x + 20 * s, y + 16 * s, 2.4);
      roughLine(ctx, x - 20 * s, y - 2 * s, x - 20 * s, y + 16 * s, 2.4);
      roughLine(ctx, x - 20 * s, y - 2 * s, x - 12 * s, y - 2 * s, 2);
      roughLine(ctx, x - 12 * s, y - 2 * s, x - 12 * s, y + 6 * s, 1.6);
      roughLine(ctx, x - 20 * s, y + 6 * s, x + 18 * s, y + 6 * s, 1.6);
      // zzz
      handText(ctx, 'z z z', x + 14 * s, y - 10 * s, { size: 12 * s, color: '#555' });
    },
    church(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.2 * s);
      roughLine(ctx, x, y - 22 * s, x, y + 16 * s, 2.4);
      roughLine(ctx, x - 12 * s, y - 10 * s, x + 12 * s, y - 10 * s, 2.4);
      roughLine(ctx, x - 16 * s, y + 16 * s, x + 16 * s, y + 16 * s, 2);
    },
    questboard(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2 * s);
      roughLine(ctx, x - 16 * s, y - 18 * s, x - 16 * s, y + 18 * s, 2.4);
      ctx.beginPath();
      ctx.moveTo(x - 14 * s, y - 16 * s); ctx.lineTo(x + 16 * s, y - 16 * s);
      ctx.lineTo(x + 16 * s, y + 10 * s); ctx.lineTo(x - 14 * s, y + 10 * s);
      ctx.closePath(); ctx.stroke();
      handText(ctx, '!', x + 1 * s, y - 1 * s, { size: 16 * s, color: '#333' });
    },
    bounty(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2 * s);
      roughLine(ctx, x - 14 * s, y - 16 * s, x - 14 * s, y + 18 * s, 2.4);
      ctx.beginPath();
      ctx.moveTo(x - 12 * s, y - 14 * s); ctx.lineTo(x + 16 * s, y - 14 * s);
      ctx.lineTo(x + 16 * s, y + 8 * s); ctx.lineTo(x - 12 * s, y + 8 * s);
      ctx.closePath(); ctx.stroke();
      handText(ctx, '$', x + 2 * s, y - 1 * s, { size: 15 * s, color: '#333' });
    },
    guildhall(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.2 * s);
      ctx.beginPath();
      ctx.moveTo(x - 20 * s, y - 4 * s); ctx.lineTo(x, y - 22 * s); ctx.lineTo(x + 20 * s, y - 4 * s);
      ctx.stroke();
      roughLine(ctx, x - 16 * s, y - 4 * s, x - 16 * s, y + 16 * s, 2);
      roughLine(ctx, x + 16 * s, y - 4 * s, x + 16 * s, y + 16 * s, 2);
      roughLine(ctx, x - 16 * s, y + 16 * s, x + 16 * s, y + 16 * s, 2);
      roughLine(ctx, x - 4 * s, y + 16 * s, x - 4 * s, y + 4 * s, 1.6);
      roughLine(ctx, x + 4 * s, y + 16 * s, x + 4 * s, y + 4 * s, 1.6);
    },
    trainingyard(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2 * s);
      roughCircle(ctx, x, y - 2 * s, 14 * s, 12);
      roughLine(ctx, x - 14 * s, y - 2 * s, x + 14 * s, y - 2 * s, 1.2);
      roughLine(ctx, x, y - 16 * s, x, y + 12 * s, 1.2);
      itemIconDrawers.sword(ctx, x + 10 * s, y + 6 * s, s * 0.5);
    },
    tavern(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2 * s);
      ctx.beginPath();
      ctx.moveTo(x - 8 * s, y - 12 * s);
      ctx.lineTo(x - 10 * s, y + 14 * s);
      ctx.lineTo(x + 10 * s, y + 14 * s);
      ctx.lineTo(x + 8 * s, y - 12 * s);
      ctx.closePath();
      ctx.stroke();
      roughLine(ctx, x - 9 * s, y, x + 9 * s, y, 1.4);
      handText(ctx, '~', x, y - 16 * s, { size: 14 * s, color: '#555' });
    },
    bank(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2.2 * s);
      roughLine(ctx, x - 18 * s, y + 14 * s, x + 18 * s, y + 14 * s, 2.4);
      for (let i = 0; i < 4; i++) {
        const xx = x - 14 * s + i * 9 * s;
        roughLine(ctx, xx, y + 14 * s, xx, y - 6 * s, 2);
      }
      roughLine(ctx, x - 20 * s, y - 6 * s, x + 20 * s, y - 6 * s, 2);
      ctx.beginPath();
      ctx.moveTo(x - 20 * s, y - 6 * s); ctx.lineTo(x, y - 18 * s); ctx.lineTo(x + 20 * s, y - 6 * s);
      ctx.stroke();
    },
    library(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2 * s);
      for (let i = 0; i < 3; i++) {
        const xx = x - 12 * s + i * 12 * s;
        roughLine(ctx, xx, y + 14 * s, xx, y - 14 * s, 2);
        roughLine(ctx, xx, y - 14 * s, xx + 8 * s, y - 16 * s, 1.4);
      }
    },
    armorshop(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2 * s);
      // chest armor silhouette
      ctx.beginPath();
      ctx.moveTo(x - 16 * s, y - 18 * s);
      ctx.lineTo(x + 16 * s, y - 18 * s);
      ctx.lineTo(x + 12 * s, y + 16 * s);
      ctx.lineTo(x - 12 * s, y + 16 * s);
      ctx.closePath(); ctx.stroke();
      roughLine(ctx, x, y - 16 * s, x, y + 14 * s, 1.6);
      roughLine(ctx, x - 14 * s, y - 8 * s, x + 14 * s, y - 8 * s, 1.4);
    },
    equipment(ctx, x, y, s) {
      setPencilStyle(ctx, '#333', 2 * s);
      itemIconDrawers.sword(ctx, x - 8 * s, y, s * 0.7);
      itemIconDrawers.shield(ctx, x + 9 * s, y + 2 * s, s * 0.6);
    }
  };

  function drawLocationIcon(ctx, x, y, scale, locId) {
    const iconSize = 52 * scale;
    if (_drawAsset(ctx, locId, x, y, iconSize, iconSize)) return;
    const fn = locationIconDrawers[locId] || locationIconDrawers.shop;
    fn(ctx, x, y, scale);
  }

  // ---- TOWN MAP BACKGROUND ----
  // Draws a hand-drawn village layout (paths, a few background buildings/trees for flavor)
  // onto a notebook background. Returns nothing; caller draws location icons/buttons on top.
  function drawTownMap(ctx, w, h) {
    if (_drawBg(ctx, 'bg_town', w, h)) return;
    drawNotebookBg(ctx, w, h);
    setPencilStyle(ctx, '#bbb', 1.4);
    // winding paths (decorative, drawn faint)
    ctx.beginPath();
    ctx.moveTo(w * 0.5, h * 0.08);
    ctx.bezierCurveTo(w * 0.3, h * 0.3, w * 0.7, h * 0.5, w * 0.4, h * 0.7);
    ctx.bezierCurveTo(w * 0.2, h * 0.85, w * 0.6, h * 0.9, w * 0.5, h * 0.98);
    ctx.stroke();
    // a few background trees for flavor, scattered near edges
    setPencilStyle(ctx, '#a8c2a8', 1.6);
    const trees = [[0.06, 0.15], [0.92, 0.2], [0.08, 0.7], [0.93, 0.6], [0.5, 0.04], [0.15, 0.92], [0.85, 0.9]];
    trees.forEach(([tx, ty]) => {
      const cx = tx * w, cy = ty * h;
      roughCircle(ctx, cx, cy - 6, 9, 8);
      roughLine(ctx, cx, cy, cx, cy + 10, 2);
    });
    handText(ctx, 'Town of Inkwell', w / 2, 22, { size: 18, color: '#444' });
  }

  // ===== PUBLIC ASSET API =====

  // Register a single asset. Call before Game.render() or at any time — images load asynchronously
  // and the procedural fallback is used until the image is ready.
  // Example: Sketch.registerAsset('goblin', '/art/enemies/goblin.png');
  function registerAsset(key, url) {
    _loadAsset(key, url);
  }

  // Register multiple assets at once.
  // Example: Sketch.registerAssets({ goblin: '/art/enemies/goblin.png', slime: '/art/enemies/slime.png' });
  function registerAssets(map) {
    Object.entries(map).forEach(([key, url]) => _loadAsset(key, url));
  }

  // Returns an object listing every asset key the renderer recognises, grouped by category.
  // Useful for generating a checklist of what art needs to be produced.
  function listAssetKeys() {
    return {
      enemies: [
        'slime', 'bat', 'goblin', 'wolf', 'skeleton', 'bandit', 'spider', 'ghost',
        'ogre', 'troll', 'wraith', 'dragon', 'zombie', 'lizardman', 'orc', 'cultist',
        'imp', 'wisp', 'harpy', 'gargoyle', 'necromancer', 'dark_knight', 'mimic'
      ],
      player: [
        'player_male', 'player_female',
        'player_male_equipped', 'player_female_equipped'
      ],
      itemIcons: [
        'sword', 'shortsword', 'longsword', 'greatsword',
        'dagger', 'axe', 'greataxe', 'mace', 'greatmace', 'hammer',
        'spear', 'greatspear', 'shortbow', 'bow', 'crossbow',
        'wand', 'staff',
        'shield', 'torch',
        'helmet', 'chest', 'boots', 'ring', 'amulet', 'cloak', 'backpack',
        'potion', 'ether', 'antidote', 'spellbook',
        'questitem', 'gold'
      ],
      locationIcons: [
        'shop', 'blacksmith', 'armorshop', 'alchemist', 'inn', 'church',
        'questboard', 'bounty', 'guildhall', 'trainingyard', 'library', 'bank', 'equipment'
      ],
      backgrounds: [
        'bg_combat', 'bg_town', 'bg_notebook'
      ]
    };
  }

  // Returns a plain-text checklist of all asset keys — handy to paste into a brief for an artist.
  function printAssetChecklist() {
    const keys = listAssetKeys();
    const lines = ['# Notebook Knight — Art Asset Checklist', ''];
    for (const [group, list] of Object.entries(keys)) {
      lines.push(`## ${group}`);
      list.forEach(k => lines.push(`  [ ] ${k}`));
      lines.push('');
    }
    return lines.join('\n');
  }

  return {
    drawCharacter, drawEnemy, drawNotebookBg, roughLine, roughCircle, setPencilStyle,
    handText, scribbleUnderline, drawItemIcon, drawItemIconCard, drawLocationIcon, drawTownMap,
    registerAsset, registerAssets, listAssetKeys, printAssetChecklist
  };
})();
// ===== GAME APPLICATION =====
const Game = (function () {
  const { ITEMS, ITEM_TYPE, WEAPON_HANDED } = ItemsData;
  const { ENEMIES } = EnemiesData;
  const { QUEST_AREAS, QUESTS, LOADOUT_LIMITS } = QuestsData;
  const PM = PlayerModel;
  const CE = CombatEngine;

  const SAVE_KEY = 'pencilKnightSave_v1';

  let state = {
    screen: 'title', // title | town | shop | inn | blacksmith | armorshop | library | church | guildhall | noticeboard | equipment | loadout | exploring | combat | victory | defeat
    player: null,
    currentArea: null,
    explorationNode: 0,
    explorationLog: [],
    activeCombat: null,
    explorationEvent: null,
    pendingQuestId: null,
    message: '',
  };

  // ---------- UTIL ----------
  function $(sel) { return document.querySelector(sel); }
  function el(tag, cls, html) { const e = document.createElement(tag); if (cls) e.className = cls; if (html !== undefined) e.innerHTML = html; return e; }
  function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
  function fmtRange(r) { return `${r[0]}-${r[1]}`; }

  function resolveEquipped(player) {
    const e = player.equipment;
    const lo = player.questLoadout || {};
    const cons = lo.consumables || [];
    const spells = player.knownSpells || [];

    // Determine what the character is visibly carrying beyond equipped gear slots.
    // These drive the belt/quiver/tome visual layers on the character sprite.
    const wpn = e.weapon ? ITEMS[e.weapon] : null;
    const isBowUser = wpn && (wpn.weaponClass === 'bow' || wpn.weaponClass === 'shortbow' || wpn.weaponClass === 'crossbow');
    const hasPotionAtBelt    = cons.some(id => ITEMS[id] && ITEMS[id].effect && (ITEMS[id].effect.heal || ITEMS[id].effect.mana));
    const hasBombAtBelt      = cons.some(id => ITEMS[id] && ITEMS[id].effect && ITEMS[id].effect.damageAll);
    const hasSpellbookAtBelt = spells.length > 0;
    const hasQuiver          = isBowUser;

    return {
      weapon:  wpn,
      offhand: e.offhand ? ITEMS[e.offhand] : null,
      helmet:  e.helmet  ? ITEMS[e.helmet]  : null,
      chest:   e.chest   ? ITEMS[e.chest]   : null,
      boots:   e.boots   ? ITEMS[e.boots]   : null,
      back:    e.back    ? ITEMS[e.back]     : null,
      ring1:   e.ring1   ? ITEMS[e.ring1]   : null,
      ring2:   e.ring2   ? ITEMS[e.ring2]   : null,
      amulet:  e.amulet  ? ITEMS[e.amulet]  : null,
      // carry flags — visible on belt/hip even when not actively using the item
      carry: { hasPotionAtBelt, hasBombAtBelt, hasSpellbookAtBelt, hasQuiver },
    };
  }

  // ---------- SAVE/LOAD ----------
  function saveGame() {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify(state.player));
      showToast('Game saved.');
    } catch (e) { showToast('Save failed: ' + e.message); }
  }
  function loadGame() {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) { showToast('No save found.'); return false; }
    try {
      state.player = JSON.parse(raw);
      QuestsData.rehydrateGeneratedQuests(state.player);
      showToast('Game loaded.');
      return true;
    } catch (e) { showToast('Load failed.'); return false; }
  }
  function hasSave() { return !!localStorage.getItem(SAVE_KEY); }

  function showToast(msg) {
    const t = $('#toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(showToast._timer);
    showToast._timer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // Generic confirm dialog — used for destructive actions like Abandon Quest.
  // Builds and tears down its own overlay; nothing to mount in the HTML shell.
  function showConfirm(message, onConfirm, opts) {
    opts = opts || {};
    const overlay = el('div', 'confirm-overlay');
    const box = el('div', 'confirm-box');
    box.appendChild(el('div', 'confirm-message', message));
    const row = el('div', 'btn-row confirm-btn-row');
    const yesBtn = el('button', 'btn btn-danger', opts.confirmLabel || 'Confirm');
    const noBtn = el('button', 'btn btn-secondary', opts.cancelLabel || 'Cancel');
    function close() { overlay.remove(); }
    yesBtn.onclick = () => { close(); onConfirm(); };
    noBtn.onclick = close;
    row.appendChild(yesBtn);
    row.appendChild(noBtn);
    box.appendChild(row);
    overlay.appendChild(box);
    overlay.onclick = (e) => { if (e.target === overlay) close(); };
    document.body.appendChild(overlay);
  }

  // ---------- INIT / NEW GAME ----------
  function startNewGame(gender) {
    state.player = PM.createNewPlayer('Notebook Knight', gender);
    // starting gear
    PM.addToStorage(state.player, 'wpn_rusty_sword');
    PM.addToStorage(state.player, 'chs_padded_vest');
    PM.equipItem(state.player, 'wpn_rusty_sword');
    PM.equipItem(state.player, 'chs_padded_vest');
    PM.addToStorage(state.player, 'cns_potion_small', 2);
    goTo('town');
  }

  let _sfxTransitionEl = null;
  // Mute preference persists across sessions via localStorage (this is the real game running in
  // a real browser tab, not a sandboxed chat widget, so localStorage is fine here).
  function isMuted() {
    try { return localStorage.getItem('nk_muted') === '1'; } catch (e) { return false; }
  }
  function setMuted(val) {
    try { localStorage.setItem('nk_muted', val ? '1' : '0'); } catch (e) { /* ignore */ }
  }

  function playScreenTransitionSfx() {
    if (isMuted()) return;
    try {
      if (!_sfxTransitionEl) {
        _sfxTransitionEl = new Audio(SFX_SCREEN_TRANSITION);
        _sfxTransitionEl.volume = 0.5;
      }
      _sfxTransitionEl.currentTime = 0;
      _sfxTransitionEl.play().catch(() => {});
    } catch (e) { /* audio unavailable - fail silently, never blocks navigation */ }
  }

  // Looping scratch sound for the hold-to-preview "write on the sticky note" effect (see
  // writeOnNote()/stopWritingOnNote() in renderTown). Reuses the same soft-scribble sample as
  // the screen-transition SFX rather than a separate asset, just looped for the duration of the
  // hold and stopped as soon as writing ends (button release or the text finishes typing).
  let _sfxWriteEl = null;
  function playWriteSfx() {
    if (isMuted()) return;
    try {
      if (!_sfxWriteEl) {
        _sfxWriteEl = new Audio(SFX_SCREEN_TRANSITION);
        _sfxWriteEl.loop = true;
        _sfxWriteEl.volume = 0.35;
      }
      if (_sfxWriteEl.paused) {
        _sfxWriteEl.currentTime = 0;
        _sfxWriteEl.play().catch(() => {});
      }
    } catch (e) { /* audio unavailable - fail silently */ }
  }
  function stopWriteSfx() {
    if (!_sfxWriteEl) return;
    try { _sfxWriteEl.pause(); _sfxWriteEl.currentTime = 0; } catch (e) { /* ignore */ }
  }

  // Icon-only toggle button - the speaker icon is baked into the art itself (no code-drawn
  // label), so this just swaps between the two pre-made states and flips the persisted flag.
  // wrapClass lets the same button be dropped into different fixed-position contexts (the game
  // artboard's calc-based corner anchor vs. the title screen's simpler absolute corner).
  function makeMuteButton(wrapClass) {
    const wrapper = el('div', wrapClass || 'nb-mute-btn');
    const imgOn = _assetCache['btnSoundOn'];
    const imgOff = _assetCache['btnSoundOff'];
    if (!imgOn) { _loadAsset('btnSoundOn').then(() => render()); }
    if (!imgOff) { _loadAsset('btnSoundOff').then(() => render()); }
    if (imgOn && imgOff) {
      const c = document.createElement('canvas');
      c.className = 'nb-mute-btn-canvas';
      c.width = 400; c.height = 400;
      function draw() {
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        ctx.drawImage(isMuted() ? imgOff : imgOn, 0, 0, c.width, c.height);
      }
      draw();
      c.style.cursor = 'pointer';
      c.addEventListener('click', () => { setMuted(!isMuted()); draw(); });
      wrapper.appendChild(c);
    } else {
      const btn = el('button', 'btn btn-small', isMuted() ? 'Unmute' : 'Mute');
      btn.onclick = () => { setMuted(!isMuted()); render(); };
      wrapper.appendChild(btn);
    }
    return wrapper;
  }

  function goTo(screen) {
    playScreenTransitionSfx();
    state.screen = screen;
    render();
  }

  // ---------- RENDER ROOT ----------
  function getBoardQuestIds(boardId) {
    return QuestsData.getActiveBoardQuestIds(boardId, state.player);
  }

  function render() {
    const root = $('#app');
    root.innerHTML = '';
    // Title and charselect use position:fixed menu-screen/menu-artboard — append to root directly.
    // All game screens (town onward) live inside a 9:16 game-artboard container.
    const gameScreens = ['town','shop','inn','blacksmith','armorshop','library','church',
      'guildhall','noticeboard','equipment','loadout','exploring','combat',
      'defeat','victory'];
    let screenRoot = root;
    if (gameScreens.includes(state.screen)) {
      const artboard = el('div', 'game-artboard');
      root.appendChild(artboard);
      screenRoot = artboard;
    }
    switch (state.screen) {
      case 'title': renderTitle(root); break;
      case 'charselect': renderCharSelect(root); break;
      case 'town': renderTown(screenRoot); break;
      case 'shop': Game.renderShop(screenRoot); break;
      case 'inn': Game.renderInn(screenRoot); break;
      case 'blacksmith': Game.renderBlacksmith(screenRoot); break;
      case 'armorshop': Game.renderArmorShop(screenRoot); break;
      case 'library': Game.renderLibrary(screenRoot); break;
      case 'church': Game.renderChurch(screenRoot); break;
      case 'guildhall': Game.renderBoard(screenRoot, 'Guild Hall', getBoardQuestIds('guildhall'), 'guildhall'); break;
      case 'noticeboard': Game.renderNoticeBoard(screenRoot); break;
      case 'equipment': Game.renderEquipment(screenRoot); break;
      case 'loadout': Game.renderLoadout(screenRoot); break;
      case 'exploring': Game.renderExploration(screenRoot); break;
      case 'combat': Game.renderCombat(screenRoot); break;
      case 'defeat': Game.renderDefeat(screenRoot); break;
      default: renderTown(root);
    }
  }

  // Unified asset cache — all production images go through here.
  const _assetCache = {};
  function _loadAsset(key) {
    if (_assetCache[key]) return Promise.resolve(_assetCache[key]);
    const url = SCENE_ASSETS[key];
    if (!url) return Promise.resolve(null);
    return new Promise(resolve => {
      const img = new Image();
      img.onload  = () => { _assetCache[key] = img; resolve(img); };
      img.onerror = () => { console.warn('Asset failed:', key, url); resolve(null); };
      img.src = url;
    });
  }
  function _loadAssets(keys) { return Promise.all(keys.map(_loadAsset)); }
  // Keep old alias used by makeMenuBtn
  const _menuImgCache = _assetCache;
  function _loadMenuImg(key) { return _loadAsset(key); }

  // Pre-load all assets eagerly so screens render with art immediately.
  _loadAssets(Object.keys(SCENE_ASSETS)).then(() => {
    if (state.screen === 'title') render();
  });

  // Reusable hand-drawn button: image chrome from repo + code-rendered label text.
  // Falls back to a plain CSS button if the image isn't available yet.
  function makeMenuBtn(label, onClick, enabled) {
    if (enabled === undefined) enabled = true;
    const wrapper = el('div', 'menu-btn-wrap');
    if (!enabled) wrapper.classList.add('menu-btn-disabled');

    const imgUp   = _assetCache['btnLargeUp'];
    const imgDown = _assetCache['btnLargeDown'];

    if (imgUp) {
      const c = document.createElement('canvas');
      c.className = 'menu-btn-canvas';
      c.width  = 380;
      c.height = 100;

      function draw(pressed) {
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);
        const img = (pressed && imgDown) ? imgDown : imgUp;
        ctx.globalAlpha = enabled ? 1 : 0.45;
        ctx.drawImage(img, 0, 0, c.width, c.height);
        ctx.globalAlpha = 1;
        const fs = Math.round(c.height * 0.42);
        ctx.font = '700 ' + fs + 'px "Patrick Hand", "Architects Daughter", cursive';
        ctx.fillStyle = enabled ? '#2a1f0e' : '#999';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(label, c.width / 2, c.height / 2 + 1);
      }
      draw(false);

      if (enabled) {
        c.style.cursor = 'pointer';
        c.addEventListener('pointerdown',  () => draw(true));
        c.addEventListener('pointerup',    () => { draw(false); onClick(); });
        c.addEventListener('pointerleave', () => draw(false));
      }
      wrapper.appendChild(c);
    } else {
      const btn = el('button',
        enabled ? 'btn btn-primary menu-btn-fallback' : 'btn menu-btn-fallback', label);
      if (enabled) btn.onclick = onClick;
      else btn.disabled = true;
      wrapper.appendChild(btn);
    }
    return wrapper;
  }

  function renderCharSelect(root) {
    const wrap = el('div', 'menu-screen');
    const artboard = el('div', 'menu-artboard');

    // Background
    const bgEl = el('div', 'cs-bg');
    if (_assetCache['csNbPaper']) bgEl.style.backgroundImage = 'url(' + SCENE_ASSETS.csNbPaper + ')';
    artboard.appendChild(bgEl);

    // Title only — no tagline

    artboard.appendChild(titleBlock);

    // Two panel-buttons stacked vertically, centred
    const panelsCol = el('div', 'cs-panels-col');

    ['male', 'female'].forEach(gender => {
      const dollKey    = gender === 'male' ? 'dollMale'    : 'dollFemale';
      const dollSelKey = gender === 'male' ? 'dollMaleSel' : 'dollFemaleSel';

      // The canvas IS the button — no separate button element
      const c = document.createElement('canvas');
      // Intrinsic 3:2 to match ui_panel_medium (1536×1024), rendered big
      c.width  = 600;
      c.height = 400;
      c.className = 'cs-doll-btn';
      c.style.cursor = 'pointer';
      c.setAttribute('aria-label', gender === 'male' ? 'Male Knight' : 'Female Knight');

      function drawDoll(pressed) {
        const ctx = c.getContext('2d');
        ctx.clearRect(0, 0, c.width, c.height);

        // Panel background (ui_panel_medium)
        const panelImg = _assetCache['csPanel'];
        if (panelImg) {
          ctx.drawImage(panelImg, 0, 0, c.width, c.height);
        } else {
          ctx.fillStyle = '#f5f3e8';
          ctx.fillRect(0, 0, c.width, c.height);
        }

        // Doll: base or selected state
        const dollImg = _assetCache[pressed ? dollSelKey : dollKey];
        if (dollImg) {
          // Fit the 2:3 portrait doll inside the 3:2 panel with padding
          const pad = 0.06;
          const availW = c.width  * (1 - pad * 2);
          const availH = c.height * (1 - pad * 2);
          const scale  = Math.min(availW / dollImg.naturalWidth, availH / dollImg.naturalHeight);
          const dw = dollImg.naturalWidth  * scale;
          const dh = dollImg.naturalHeight * scale;
          ctx.drawImage(dollImg, (c.width - dw) / 2, (c.height - dh) / 2, dw, dh);
        } else {
          // Procedural fallback
          Sketch.drawCharacter(ctx, c.width / 2, c.height - 40, 1.6,
            gender, { weapon: ITEMS.wpn_rusty_sword });
        }
      }

      // Load all 4 needed assets, then draw
      _loadAssets(['csPanel', dollKey, dollSelKey]).then(() => requestAnimationFrame(() => drawDoll(false)));

      // Pointer events — swap to selected state on press, navigate on release
      c.addEventListener('pointerdown',  () => drawDoll(true));
      c.addEventListener('pointerleave', () => drawDoll(false));
      c.addEventListener('pointerup',    () => {
        drawDoll(true);
        // Small delay so the selected state is visible before transition
        setTimeout(() => startNewGame(gender), 120);
      });

      panelsCol.appendChild(c);
    });

    artboard.appendChild(panelsCol);

    // Back button
    const backWrap = el('div', 'cs-back-wrap');
    backWrap.appendChild(makeSmallBtn('\u2190 Back', () => goTo('title')));
    artboard.appendChild(backWrap);

    wrap.appendChild(artboard);
    root.appendChild(wrap);
  }

  // Draws the player paper doll onto a canvas with equipment layers on top.
  // Equipment overlays are added here when art is ready — no other code needs changing.
  function drawTownCharacter(canvas, player) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // Character background — drawn first, "cover" fit (fills the canvas, no distortion)
    const bgImg = _assetCache['charBg'];
    if (bgImg) {
      const bgScale = Math.max(canvas.width / bgImg.naturalWidth, canvas.height / bgImg.naturalHeight);
      const bw = bgImg.naturalWidth  * bgScale;
      const bh = bgImg.naturalHeight * bgScale;
      const bx = (canvas.width  - bw) / 2;
      const by = (canvas.height - bh) / 2;
      ctx.drawImage(bgImg, bx, by, bw, bh);
    } else {
      _loadAsset('charBg').then(() => drawTownCharacter(canvas, player));
    }
    const dollKey = player.gender === 'male' ? 'dollMale' : 'dollFemale';
    const dollImg = _assetCache[dollKey];
    if (dollImg) {
      // Draw doll centred on top of the background, preserving 2:3 portrait ratio
      const scale = Math.min(canvas.width / dollImg.naturalWidth, canvas.height / dollImg.naturalHeight);
      const dw = dollImg.naturalWidth  * scale;
      const dh = dollImg.naturalHeight * scale;
      const dx = (canvas.width  - dw) / 2;
      const dy = (canvas.height - dh) / 2;
      ctx.drawImage(dollImg, dx, dy, dw, dh);
      // Future equipment layers go here — just ctx.drawImage(equipImg, dx, dy, dw, dh)
    } else {
      // Procedural fallback; also trigger a load+redraw
      const equipped = resolveEquipped(player);
      Sketch.drawCharacter(ctx, canvas.width / 2, canvas.height - 20, 1.2, player.gender, equipped);
      _loadAsset(dollKey).then(() => drawTownCharacter(canvas, player));
    }
  }

    // Hold-to-preview "write on the sticky note" state. Populated once the sticky note itself
    // is built further down (see noteScratchEl assignment near the note construction); declared
    // here so the building-button closures built above it can reference them - by the time a
    // user can actually press-and-hold a button, render() has already finished and these are
    // populated. writeOnNote()/stopWritingOnNote() simulate handwriting by revealing the
    // building's name then its one-line purpose blurb one character at a time.
    let noteScratchEl = null, noteScratchTitleEl = null, noteScratchDescEl = null;
    let writeTimer = null, writeCursorSpan = null;

    function placeWriteCursor(afterEl) {
      if (!writeCursorSpan) {
        writeCursorSpan = document.createElement('span');
        writeCursorSpan.className = 'nb-write-cursor';
        writeCursorSpan.textContent = '|';
      }
      afterEl.appendChild(writeCursorSpan);
    }
    function removeWriteCursor() {
      if (writeCursorSpan && writeCursorSpan.parentNode) writeCursorSpan.parentNode.removeChild(writeCursorSpan);
    }
    function writeOnNote(name, blurb) {
      if (!noteScratchEl) return;
      clearTimeout(writeTimer);
      noteScratchTitleEl.textContent = '';
      noteScratchDescEl.textContent = '';
      noteScratchEl.style.display = 'flex';
      noteScratchEl.classList.add('is-writing');
      playWriteSfx();
      let i = 0;
      function typeTitle() {
        noteScratchTitleEl.textContent = name.slice(0, i);
        placeWriteCursor(noteScratchTitleEl);
        if (i < name.length) { i++; writeTimer = setTimeout(typeTitle, 32); }
        else { writeTimer = setTimeout(startDesc, 220); }
      }
      let j = 0;
      function startDesc() { j = 0; typeDesc(); }
      function typeDesc() {
        noteScratchDescEl.textContent = blurb.slice(0, j);
        placeWriteCursor(noteScratchDescEl);
        if (j < blurb.length) { j++; writeTimer = setTimeout(typeDesc, 20); }
        else { removeWriteCursor(); stopWriteSfx(); }
      }
      typeTitle();
    }
    function stopWritingOnNote() {
      clearTimeout(writeTimer);
      removeWriteCursor();
      stopWriteSfx();
      if (noteScratchEl) {
        noteScratchEl.style.display = 'none';
        noteScratchEl.classList.remove('is-writing');
      }
    }

    hamletArt.alt = '';

    wrap.appendChild(hamletArt);

    // ── Notebook page wrapper (bg + margin stats + name) ──

    function makeProdBuilding(bld) {
      const idleImg = _assetCache[bld.idleKey];

  // Knight title: Ser Scribble (male) or Dame Doodle (female)

  // Draws the stats column onto a canvas, mirroring the reference image layout.

  // Stat layout (top to bottom):
  //   Lvl value, Lvl label, — sep —, XP value, XP label,
  //   — sep —, HP value, HP label, — sep —, MP value, MP label,
  //   — sep —, ATK value, ATK label, DEF value, DEF label,
  //   — sep —, SPD value, SPD label, — sep —, Gold value, Gold label
  function drawMarginStats(canvas, player) {
    const total = PM.computeEquippedStats(player);
    const ctx = canvas.getContext('2d');
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);

    // Font settings — italic bold to match handwritten reference
    const FONT = '700 italic {SIZE}px "Patrick Hand", cursive';
    // Cap font sizes so they stay legible even if canvas is larger than expected
    const VALUE_SIZE = Math.min(Math.round(W * 0.38), 28);
    const LABEL_SIZE = Math.min(Math.round(W * 0.30), 20);
    const SEP_Y_SIZE = 2;

    ctx.textAlign = 'center';
    const RX = W * 0.5;  // centre text within the margin

    function drawStat(value, label, yPct, sepAbove) {
      const yBase = H * yPct;
      if (sepAbove) {
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(W * 0.06, yBase - H * 0.018, W * 0.88, SEP_Y_SIZE);
      }
      // Stretch text 150% horizontally around the centre point
      ctx.save();
      ctx.translate(RX, 0);
      ctx.scale(1.875, 1);
      ctx.translate(-RX, 0);
      // Value (larger)
      ctx.font = FONT.replace('{SIZE}', VALUE_SIZE);
      ctx.fillStyle = '#0a0a0a';
      ctx.fillText(String(value), RX, yBase + VALUE_SIZE);
      // Label (smaller, below)
      ctx.font = FONT.replace('{SIZE}', LABEL_SIZE);
      ctx.fillStyle = '#1a1a1a';
      ctx.fillText(label, RX, yBase + VALUE_SIZE + LABEL_SIZE + 2);
      ctx.restore();
    }

    const xp = player.level >= PM.MAX_LEVEL ? 'MAX' : `${player.xp}/${player.xpToNext}`;

    // Layout positions as % of canvas height — derived from reference image analysis
    // Reference map: Lvl@2.6%, sep@4.4%, XP@7.0%, sep@13.5%, HP@16%, sep@~22%, MP@19.3%,
    //   sep@31.7%, ATK@25.1%, DEF@28.3%, SPD@34.4%, Gold@43.1%
    // Normalised to fit within our canvas (we use 90% of height)
    drawStat(`Lv: ${player.level}`, '',      0.02,  false);
    drawStat(xp,                   'XP',     0.08,  true);
    drawStat(`${player.hp}/${total.maxHp}`,  'HP',  0.17,  true);   // sep above = group divider after XP
    drawStat(`${player.mp}/${total.maxMp}`,  'MP',  0.26,  false);  // NO sep — MP stays with HP
    drawStat(total.atk,            'ATK',    0.37,  true);   // sep above = group divider after HP+MP
    drawStat(total.def,            'DEF',    0.47,  false);  // NO sep — DEF stays with ATK
    drawStat(total.spd,            'SPD',    0.57,  false);  // NO sep — SPD stays with ATK+DEF
    drawStat(player.gold,          'Gold',   0.68,  true);   // sep above = group divider after ATK+DEF+SPD
  }

  // Creates the full-page notebook layout used by town and all sub-screens.
  // Returns a wrapper div that contains:

  //   - the knight name across the top margin
  //   - a content area div for the screen's actual content
  // All screens call renderHeader() which now returns this wrapper.
  // nameOption controls what (if anything) renders in the fixed-position ".nb-page-name" slot
  // at the top of the page:

  //   - a string: shows that text instead (location screens pass their own location title here,

    marginCanvas.height = 900;

    const headerCap = el('div', 'nb-page-header-cap');

        headerCap.style.backgroundImage = 'url(' + SCENE_ASSETS.pageBg + ')';

      drawMarginStats(marginCanvas, state.player);

    wrapper.nbContent = nbContent;
    return wrapper;
  }

  // Maps a location screen's locId to its hand-drawn interior banner illustration (see
  // SCENE_ASSETS above). Locations without a mapped asset fall back to the procedural sketch.
  const LOCATION_BANNER_ASSET_KEY = {
    shop: 'bannerShop', blacksmith: 'bannerBlacksmith', armorshop: 'bannerArmorshop',
    inn: 'bannerInn', library: 'bannerLibrary', church: 'bannerChurch',
    guildhall: 'bannerGuildhall', noticeboard: 'bannerQuestBoard',
  };

  // so the screen is never blank.
  function renderLocationBanner(locId, title) {
