      if (item.effect.damageAll) parts.push(`${item.effect.damageAll.power} ${item.effect.damageAll.element} dmg to all`);
      if (item.effect.applyPoison) parts.push(`Poisons target (${item.effect.applyPoison.power}/turn x${item.effect.applyPoison.duration})`);
      if (item.effect.confuse) parts.push('Confuses enemies this round');
      if (item.effect.autoRevive) parts.push('Auto-revive at 50% HP (one use)');
    }
    return parts.join(', ') || item.description;
  }

  function renderItemList(container, itemIds, mode, opts = {}) {
    // mode: 'buy' | 'sell' | 'view'
    itemIds.forEach(itemId => {
      const item = ITEMS[itemId];
      const row = G.el('div', 'item-row item-row-with-icon');
      const iconCanvas = document.createElement('canvas');
      iconCanvas.width = 56; iconCanvas.height = 56;
      iconCanvas.className = 'item-icon';
      row.appendChild(iconCanvas);
      const textCol = G.el('div', 'item-row-text');
      textCol.appendChild(G.el('div', 'item-name', `${item.name} <span class="rarity">${item.rarity || ''}</span>`));
      textCol.appendChild(G.el('div', 'item-desc', item.description));
      textCol.appendChild(G.el('div', 'item-stats', itemStatLine(item)));
      textCol.appendChild(G.el('div', 'item-value', `${item.value} gold`));
      row.appendChild(textCol);
      requestAnimationFrame(() => Sketch.drawItemIconCard(iconCanvas, item));
      if (mode === 'buy') {
        const alreadyKnown = item.type === ITEM_TYPE.SPELLBOOK && G.state.player.knownSpells.includes(itemId);
        const btn = G.el('button', 'btn btn-small', alreadyKnown ? 'Known' : 'Buy');
        if (alreadyKnown) btn.classList.add('btn-disabled');
        btn.onclick = () => {
          if (alreadyKnown) { G.showToast('You already know this spell.'); return; }
          if (G.state.player.gold < item.value) { G.showToast('Not enough gold.'); return; }
          G.state.player.gold -= item.value;
          PM.addToStorage(G.state.player, itemId);
          G.showToast(item.type === ITEM_TYPE.SPELLBOOK ? `Learned ${item.name}!` : `Bought ${item.name}.`);
          G.render();
        };
        row.appendChild(btn);
      } else if (mode === 'sell') {
        const btn = G.el('button', 'btn btn-small', 'Sell');
        btn.onclick = () => {
          const sellPrice = Math.floor(item.value * 0.5);
          if (!PM.removeFromStorage(G.state.player, itemId)) { G.showToast('You do not own this.'); return; }
          G.state.player.gold += sellPrice;
          G.showToast(`Sold ${item.name} for ${sellPrice} gold.`);
          G.render();
        };
        row.appendChild(btn);
      }
      container.appendChild(row);
    });
  }

  // Helper: get shop inventory filtered by player level tier
  function shopItemsByLevel(allItems) {
    const level = G.state.player.level;
    return allItems.filter(id => {
      const item = ITEMS[id];
      if (!item) return false;
      return true; // all items available; level gates handled per-shop for now
    });
  }

  // ---------- INN & TAVERN ----------
  G.renderInn = function (root) {
    const wrap = G.el('div', 'screen');
    const _nbh = G.renderHeader('The Inn'); wrap.appendChild(_nbh); const _nbc = _nbh.nbContent || wrap;
    _nbc.appendChild(G.renderLocationBanner('inn', 'The Inn'));
    _nbc.appendChild(G.el('p', 'flavor', 'Mugs clink and pencil shavings litter the floor, but the beds upstairs are clean.'));
    const cost = 10;
    const p = G.state.player;
    const total = PM.computeEquippedStats(p);
    const full = p.hp >= total.maxHp && p.mp >= total.maxMp;
    // Rest is unavailable while on an active quest — visit the Church instead
    if (p.activeQuest) {
      const churchCost = cost + 5;
      _nbc.appendChild(G.el('div', 'warn-box',
        `You are on an active quest — Bertram won't let a knight rest mid-quest. Visit the Church to be healed (${churchCost} gold).`));
    } else {
      const btn = G.el('button', 'btn btn-primary', `Rest (${cost} gold) — Full HP/MP`);
      if (full) {
        _nbc.appendChild(G.el('p', null, 'You are already at full health.'));
      } else if (p.gold < cost) {
        btn.disabled = true;
        btn.textContent = `Rest (${cost} gold) — Not enough gold`;
        _nbc.appendChild(btn);
      } else {
        btn.onclick = () => {
          p.gold -= cost;
          p.hp = total.maxHp; p.mp = total.maxMp;
          G.showToast('You feel fully rested.');
          G.render();
        };
        _nbc.appendChild(btn);
      }
    }

    const innNpc = NPCS.innkeeper;
    _nbc.appendChild(G.renderNpcPanel(innNpc, innNpc.dialogue(G.state.player)));

    _nbc.appendChild(G.el('h3', null, 'Overheard at the Bar'));
    _nbc.appendChild(G.el('div', 'rumor-box', `"${getRumorForPlayer(G.state.player)}"`));

    _nbc.appendChild(G.el('h3', null, `A tip from ${innNpc.name}:`));
    _nbc.appendChild(G.el('div', 'tip-box', getTipForPlayer(G.state.player)));

    root.appendChild(wrap);
  };

      'Nobody who has gone to the ruins has come back empty-handed. Those who came back at all.'
    ];
    if (done.includes('q_ogre_hill')) pool.push('They say someone killed the Ogre. Single-handed. The hill is quiet now.');

  // ---------- BANK ----------
  // Shared quest-list rendering, used by renderBoard and renderLibrary's lore-quest section.
  // Quests are split into two sections:
  //   "Recommended Adventures" — within ±1 level of the player
  //   "Earlier Adventures"     — more than 1 level below the player
  // XP scaling labels are shown when the player has out-leveled a quest.
  function renderQuestListInto(container, questIds, p) {
    if (p.activeQuest) {
      container.appendChild(G.el('div', 'warn-box', `Active quest: ${G.QUESTS[p.activeQuest].name}. Complete or abandon it first.`));
    }

    // Split quests into recommended vs. earlier
    const recommended = [];
    const earlier = [];
    questIds.forEach(qid => {
      const q = G.QUESTS[qid];
      if (!q) return;
      const gap = p.level - q.recLevel;
      if (gap > 1) earlier.push(qid);
      else recommended.push(qid);
    });

    function buildQuestRow(qid) {
      const q = G.QUESTS[qid];
      const done = p.completedQuests.includes(qid);
      const area = G.QUEST_AREAS[q.area];
      const row = G.el('div', 'item-row');

      // Title line with completion badge
      const titleEl = G.el('div', 'item-name');
      titleEl.textContent = q.name;
      if (done) titleEl.appendChild(G.el('span', 'quest-done-badge', ' ✓ Completed'));
      row.appendChild(titleEl);

      row.appendChild(G.el('div', 'item-desc', q.description));
      if (q.difficultyHint) row.appendChild(G.el('div', 'quest-hint', `⚠ ${q.difficultyHint}`));

      // Level / area line
      const lvlWarning = !done && p.level < q.recLevel - 1 ? ' ⚠ Above your level!' : '';
      row.appendChild(G.el('div', 'item-stats', `Lv. ${q.recLevel}${lvlWarning} — ${area.name}`));

      // Flavor + dark warning
      if (area.flavorLine && !done) row.appendChild(G.el('div', 'area-flavor', `📍 ${area.flavorLine}`));
      if (area.isDark && !done) row.appendChild(G.el('div', 'dark-warning', '🌑 Dark — bring a 🕯️ Torch or 🏮 Lantern'));

      // Reward line — show scaled XP when relevant
      const rewardItems = (q.reward.items || []).map(i => ITEMS[i]?.name || i).join(', ') || 'none';
      const scale = G.questXpScale ? G.questXpScale(p.level, q.recLevel) : 1;
      const scaledXp = Math.floor(q.reward.xp * scale);
      const xpDisplay = scale >= 1 ? `${q.reward.xp} XP`
        : scale === 0 ? `<span class="xp-zero">No XP</span>`
        : `<span class="xp-reduced">${scaledXp} XP <span class="xp-badge">${Math.round(scale*100)}%</span></span>`;
      const rewardEl = G.el('div', 'item-stats quest-reward-line');
      rewardEl.innerHTML = `Reward: ${q.reward.gold} gold, ${xpDisplay} — items: ${rewardItems}`;
      row.appendChild(rewardEl);

      // Accept button
      if (!done && !p.activeQuest) {
        const btn = G.el('button', 'btn btn-small', 'Accept Quest');
        btn.onclick = () => {
          p.activeQuest = qid;
          p.questProgress = { defeated: 0, collected: 0, bossDefeated: false };
          G.showToast(`Accepted: ${q.name}`);
          G.goTo('loadout');
        };
        row.appendChild(btn);
      }
      return row;
    }

    // Render recommended section
    if (recommended.length > 0) {
      const recList = G.el('div', 'item-list');
      recommended.forEach(qid => recList.appendChild(buildQuestRow(qid)));
      container.appendChild(recList);
    }

    // Render earlier section (collapsed visually, still accessible)
    if (earlier.length > 0) {
      const earlierSection = G.el('div', 'earlier-quests-section');
      const earlierHeader = G.el('div', 'earlier-quests-header', '⬆ Earlier Adventures (reduced XP)');
      earlierSection.appendChild(earlierHeader);
      const earlierList = G.el('div', 'item-list earlier-quests-list');
      earlier.forEach(qid => earlierList.appendChild(buildQuestRow(qid)));
      earlierSection.appendChild(earlierList);
      container.appendChild(earlierSection);
    }

    if (recommended.length === 0 && earlier.length === 0) {
      container.appendChild(G.el('div', 'empty-note', 'All adventures completed here. Check back after more quests become available.'));
    }
  }

    const lightBonus = (areaIsDark && playerHasLight) ? 0.08 : 0;
    const weights = {
      combat: 0.27 - lightBonus * 0.5, trap: 0.10, spring: 0.10, merchant: 0.10,
      shrine: 0.09, campfire: 0.085, statue: 0.07, injured_adventurer: 0.05,
      empty: 0.05 - lightBonus * 0.3,
      hidden_cache: 0.035 + lightBonus * 0.4, mini_boss_room: 0.035 + lightBonus * 0.4, secret_merchant: 0.015 + lightBonus * 0.2
    };
    const roll = () => {
      const r = Math.random();
      let acc = chest;
      if (r < acc) return 'chest';
      for (const key of Object.keys(weights)) {
        acc += weights[key] * remaining;
        if (r < acc) return key;
      }
      return 'combat';
    };
    let outcome = roll();
    // Task 6: the opening of every quest should encourage curiosity, not fizzle immediately —
    // never let the very first node of an area come up empty. Re-roll a few times; if we're
    // still unlucky, fall back to combat rather than looping forever.
    if (isFirstNode) {
      let tries = 0;
      while (outcome === 'empty' && tries < 6) { outcome = roll(); tries++; }
      if (outcome === 'empty') outcome = 'combat';
    }
    return outcome;
  }

  function advanceNode(area, quest) {
    G.state.explorationNode++;
    G.state.lastLoot = null;
    G.state.merchantOffer = null;
    G.state.explorationEvent = null;
    const outcome = rollExplorationOutcome(area, G.state.explorationNode === 1);
    const p = G.state.player;

    if (outcome === 'chest') {
      // 8% chance the chest is a mimic — a secret encounter hiding as loot (Sprint 7: reduced
      // from 20% and now stat-scaled to the area, so it stays a special surprise instead of the
      // single most common cause of death)
      if (Math.random() < 0.08) {
        G.state.explorationLog.push('You reach for the chest. The lid snaps open. That is not a hinge. Those are TEETH.');
        startCombat([getMimicIdForArea(area)], false);
        return;
      }
      const pool = getChestLootPool(area);
      const found = pool[Math.floor(Math.random() * pool.length)];
      PM.addToStorage(p, found);
      G.state.explorationLog.push(`You pry open a battered chest. Inside: ${ITEMS[found].name}!`);
      G.state.lastLoot = found;
      G.render(); return;
    }

    if (outcome === 'hidden_cache') {
      // Rarer discovery: a concealed stash with better loot.
      // 5% chance of a legendary secret weapon — the Pencil Itself.
      if (Math.random() < 0.05) {
        PM.addToStorage(p, 'wpn_the_pencil');
        G.state.explorationLog.push('Wedged into a crack in the wall: a single pencil, still sharp. You feel it hum. This is the one everything was drawn with.');
        G.state.lastLoot = 'wpn_the_pencil';
        G.render(); return;
      }
      const level = area.recLevel || 1;
      const rarePools = [
        ['rng_crit', 'rng_fire', 'rng_frost', 'rng_shadow', 'rng_mana'],
        ['amu_guardian', 'amu_sage', 'amu_shadow', 'amu_storm'],
        ['sbk_firebolt', 'sbk_iceblast', 'sbk_lightning_bolt', 'sbk_holy_light'],
        ['cns_elixir', 'cns_phoenix_feather', 'cns_thunder_stone']
      ];
      // Higher-level areas get access to rarer weapons in their cache
      if (level >= 6) rarePools.push(['wpn_steel_fang', 'wpn_elvish_shortbow', 'wpn_runic_edge', 'sbk_absolute_zero']);
      if (level >= 7) rarePools.push(['wpn_stormcaller', 'wpn_skypiercer', 'wpn_frostbite', 'wpn_widowmaker']);
      if (level >= 8) rarePools.push(['wpn_void_wand', 'sbk_void_rift', 'amu_arcane_heart', 'amu_lich']);
      const pool = rarePools[Math.floor(Math.random() * rarePools.length)];
      const found = pool[Math.floor(Math.random() * pool.length)];
      PM.addToStorage(p, found);
      G.state.explorationLog.push(`Behind a loose stone you discover a hidden cache! You pocket the ${ITEMS[found].name}.`);
      G.state.lastLoot = found;
      G.render(); return;
    }

    if (outcome === 'empty') {
      G.state.explorationLog.push(EMPTY_FLAVOR[Math.floor(Math.random() * EMPTY_FLAVOR.length)]);
      G.render(); return;
    }

    if (outcome === 'trap') {
      const line = TRAP_FLAVOR[Math.floor(Math.random() * TRAP_FLAVOR.length)];
      const dmg = G.rand(3, Math.max(6, (area.recLevel||1) * 2));
      p.hp = Math.max(1, p.hp - dmg);
      const goldLoss = Math.random() < 0.35 ? Math.min(p.gold, G.rand(2, 12)) : 0;
      p.gold -= goldLoss;
      let msg = `${line} You take ${dmg} damage.`;
      if (goldLoss > 0) msg += ` ${goldLoss} gold rattles loose from your belt pouch.`;
      G.state.explorationLog.push(msg);
      G.render(); return;
    }

    if (outcome === 'spring') {
      const total = PM.computeEquippedStats(p);
      const healAmt = Math.floor(total.maxHp * 0.35);
      const mpAmt = Math.floor(total.maxMp * 0.35);
      const hpBefore = p.hp; const mpBefore = p.mp;
      p.hp = Math.min(total.maxHp, p.hp + healAmt);
      p.mp = Math.min(total.maxMp, p.mp + mpAmt);
      G.state.explorationLog.push(`A hidden spring trickles from the rock face. You rest briefly and recover ${p.hp-hpBefore} HP and ${p.mp-mpBefore} MP.`);
      G.render(); return;
    }

    if (outcome === 'shrine') {
      // Restores MP only — shrines feel magical, distinct from springs
      const total = PM.computeEquippedStats(p);
      const mpAmt = Math.floor(total.maxMp * 0.5);
      const mpBefore = p.mp;
      p.mp = Math.min(total.maxMp, p.mp + mpAmt);
      const shrineFlavor = [
        'A weathered shrine stands here. You mutter a quick prayer and your magic flows stronger.',
        'A small idol carved from stone. You leave a coin and feel your mana restored.',
        'Sigils etched in an old wall pulse once as you pass. Your spells feel charged.',
        'An altar, cracked but still potent. You touch it and feel magical energy fill you.'
      ];
      G.state.explorationLog.push(shrineFlavor[Math.floor(Math.random() * shrineFlavor.length)] + ` (+${p.mp-mpBefore} MP)`);
      G.render(); return;
    }

    if (outcome === 'campfire') {
      // Restores HP only — warmth and rest
      const total = PM.computeEquippedStats(p);
      const healAmt = Math.floor(total.maxHp * 0.25);
      const hpBefore = p.hp;
      p.hp = Math.min(total.maxHp, p.hp + healAmt);
      const fireFlavor = [
        'Someone left a campfire still smoldering. You warm your hands and catch your breath.',
        'A dying campfire. You poke it back to life, rest for a few minutes, and move on.',
        'An abandoned camp with embers still glowing. A brief rest restores your strength.',
        'The fire is fresh — whoever built it fled recently. You sit by it and recover.'
      ];
      G.state.explorationLog.push(fireFlavor[Math.floor(Math.random() * fireFlavor.length)] + ` (+${p.hp-hpBefore} HP)`);
      G.render(); return;
    }

    if (outcome === 'statue') {
      // Lore + small random blessing OR trap-style curse. Feels like a choice but actually random.
      const blessed = Math.random() < 0.65; // 65% chance of blessing
      if (blessed) {
        const total = PM.computeEquippedStats(p);
        p.gold += G.rand(8, 20);
        const statueFlavor = [
          'An ancient statue of a forgotten warrior. Something about it feels right — you leave an offering and find a few coins at its base in return.',
          'A moss-covered idol raises one arm in greeting. You bow and it seems to approve. Coins glint in the dirt nearby.',
          'A cracked statue of a knight, sword raised. You trace the carvings and feel oddly fortunate. Gold rests at its feet.',
          'Stone eyes follow you. You leave a small offering. Gold appears where you left nothing.'
        ];
        G.state.explorationLog.push(statueFlavor[Math.floor(Math.random() * statueFlavor.length)]);
      } else {
        const dmg = G.rand(4, 10);
        p.hp = Math.max(1, p.hp - dmg);
        const curseFlavor = [
          `A black-eyed statue seems to watch you. You reach out to touch it — a jolt of dark energy throws you back (${dmg} damage).`,
          `An idol with too many arms. You look directly at it and immediately wish you had not. ${dmg} damage from the psychic shock.`,
          `The statue's expression shifts as you approach. You feel a cold drain on your vitality. ${dmg} HP lost.`
        ];
        G.state.explorationLog.push(curseFlavor[Math.floor(Math.random() * curseFlavor.length)]);
      }
      G.render(); return;
    }

    if (outcome === 'injured_adventurer') {
      // You can help (costs a potion from loadout) or pass by (nothing happens)
      // If you help, you receive a reward
      G.state.explorationEvent = { type: 'injured_adventurer' };
      G.state.explorationLog.push('You find an injured adventurer slumped against a tree, clutching a wound. They look up at you with desperate eyes.');
      G.render(); return;
    }

    if (outcome === 'mini_boss_room') {
      // A special room with a mini-boss guarding treasure.
      // Uses a stronger version of an existing area enemy as the threat.
      const miniBossOptions = {
        meadow_path: 'bat', goblin_woods: 'orc', old_mine: 'lizardman',
        sewers: 'ghost', graveyard: 'skeleton', bandit_camp: 'dark_knight',
        haunted_crypt: 'cultist', mountains: 'orc', snow_pass: 'gargoyle',
        abandoned_tower: 'necromancer', swamp: 'gargoyle', ruins: 'dark_knight',
        cursed_village: 'necromancer', lava_caves: 'dark_knight'
      };
      // Sprint 7: the default mini-boss mimic is now area-scaled instead of the flat 'mimic' id
      const bossId = miniBossOptions[area.id] || getMimicIdForArea(area);
      G.state.explorationLog.push('A reinforced door. Behind it, something heavy moves. Whatever is guarding this room is bigger than usual.');
      // Fight it — on victory, grant a bonus chest loot
      G.state._pendingMiniBossLoot = true;
      startCombat([bossId], false);
      return;
    }

    if (outcome === 'secret_merchant') {
      // Extremely rare: a merchant selling a single epic item at full price
      const epicStock = [
        'wpn_dragonbone_greatsword', 'wpn_void_wand', 'wpn_celestial_staff', 'wpn_dragonbone_bow',
        'chs_celestial_plate', 'bts_celestial_striders', 'amu_dragon', 'amu_celestial',
        'sbk_inferno', 'sbk_absolute_zero', 'sbk_void_rift', 'cns_phoenix_feather',
        'rng_void', 'rng_dragon', 'rng_celestial', 'bck_void_cloak'
      ];
      const secretItem = epicStock[Math.floor(Math.random() * epicStock.length)];
      G.state.merchantOffer = [secretItem];
      G.state.explorationLog.push('A cloaked figure sits cross-legged on a boulder, apparently asleep. One eye opens. "Ah. You found me. I have one item. You will not see it anywhere else."');
      G.render(); return;
    }

    if (outcome === 'merchant') {
      G.state.merchantOffer = generateMerchantOffer(area);
      G.state.explorationLog.push('A traveling merchant steps out of the shadows, pack overflowing with wares. "Looking to buy, traveler?"');
      G.render(); return;
    }

    const enemies = pickEncounter(area);
    startCombat(enemies, false);
  }

  function generateMerchantOffer(area) {
    const level = (area && area.recLevel) || 1;
    const pools = [
      ['cns_potion_small', 'cns_potion_medium', 'cns_ether_small', 'cns_antidote', 'cns_burn_salve'],
      level >= 3 ? ['cns_potion_large', 'cns_elixir', 'cns_cleanse', 'cns_smoke_bomb'] : [],
      level >= 5 ? ['cns_strength_draft', 'cns_iron_skin', 'cns_haste_draft', 'cns_poison_vial'] : [],
      level >= 6 ? ['cns_bomb', 'cns_thunder_stone', 'cns_holy_water'] : [],
      ['off_torch', 'bts_worn_boots', 'bck_travel_cloak', 'hlm_cloth_cap']
    ].flat().filter(id => ITEMS[id]);
    const picks = [];
    const pool = [...new Set(pools)];
    for (let i = 0; i < Math.min(3, pool.length); i++) {
      const idx = Math.floor(Math.random() * pool.length);
      picks.push(pool.splice(idx, 1)[0]);
    }
    return picks;
  }

  // ---------- COMBAT ----------
  function startCombat(enemyIds, isBoss) {
    G.state.lastLoot = null;
    G.state.merchantOffer = null;
    const p = G.state.player;
    const stats = buildCombatStats(p);
    const combatState = CE.createCombatState(stats, enemyIds);
    combatState.isBoss = isBoss;
    // Light & darkness — read from the current area and the player's loadout
    const area = G.QUEST_AREAS[G.state.currentArea];
    combatState.isDark = !!(area && area.isDark);
    combatState.hasLight = !!stats.hasLight;
    G.state.activeCombat = combatState;
    beginRound(combatState);
    advanceQueueUntilPlayerTurnOrEnd(combatState);
    syncPlayerHpMpFromCombat();
    G.goTo('combat');
  }

  function syncPlayerHpMpFromCombat() {
    const p = G.state.player;
    const cs = G.state.activeCombat;
    p.hp = Math.max(0, cs.player.hp);
    p.mp = cs.player.mp;
  }

  function beginRound(cs) {
    CE.rollInitiative(cs);
    cs.roundLog = cs.initiativeOrder.map(e => `${e.name} rolled ${e.roll}+${e.spd} SPD = ${e.total}`);
  }

  // Advances through the initiative queue, auto-resolving enemy turns and the player's own DoT ticks,
  // and stops either when it's the player's turn to act (and they're still alive after any burn tick)
  // or combat has ended.
  function advanceQueueUntilPlayerTurnOrEnd(cs) {
    while (!cs.finished) {
      if (cs.initiativeIndex >= cs.initiativeOrder.length) {
        beginRound(cs);
        continue;
      }
      const entry = cs.initiativeOrder[cs.initiativeIndex];
      if (entry.side === 'player') {
        if (!cs.player.alive) { cs.initiativeIndex++; continue; }
        // Process the player's own burn DoT at the top of their turn slot, before they can act.
        if (!cs.player._tickedThisSlot) {
          CE.processPlayerStatusTicks(cs);
          cs.player._tickedThisSlot = true;
          if (CE.checkCombatEnd(cs)) return;
        }
        return; // stop here, wait for player input
      }
      const enemy = cs.enemies.find(e => e.uid === entry.uid);
      cs.initiativeIndex++;
      if (!enemy || !enemy.alive) continue;
      CE.enemyTurn(cs, enemy);
      if (CE.checkCombatEnd(cs)) return;
    }
  }

  G.renderCombat = function (root) {
    const wrap = G.el('div', 'screen combat-screen');
    wrap.appendChild(G.renderPageBg()); // same notebook-paper background every other screen uses
    // Everything else goes in a positioned content layer above the background - the background
    // is itself a positioned (fixed) element, and positioned elements paint in z-index order
    // AFTER normal static in-flow content, so without this the plain canvas/log/buttons below
    // would end up painted underneath the (visually opaque) page background instead of on top of
    // it, same as every other screen's .nb-content sits above its .nb-page-bg.
    const content = G.el('div', 'combat-content');
    wrap.appendChild(content);
    const p = G.state.player;
    const cs = G.state.activeCombat;

    if (!cs.finished) {
      const isPlayerTurn = cs.initiativeOrder && cs.initiativeOrder[cs.initiativeIndex] && cs.initiativeOrder[cs.initiativeIndex].side === 'player';
      if (!isPlayerTurn) {
        advanceQueueUntilPlayerTurnOrEnd(cs);
        syncPlayerHpMpFromCombat();
      }
    }

    const canvas = document.createElement('canvas');
    canvas.width = 600; canvas.height = 320;
    canvas.className = 'combat-canvas';
    content.appendChild(canvas);

    // Darkness indicator — shows clearly whether the area is dark and whether light is active
    if (cs.isDark) {
      const darkBanner = G.el('div', cs.hasLight ? 'light-banner' : 'dark-banner');
      darkBanner.textContent = cs.hasLight
        ? '✨ Your light pushes back the darkness.'
        : '🌑 Darkness — accuracy –20%, crits disabled. (Bring a Torch or Lantern next time.)';
      content.appendChild(darkBanner);
    }

    if (cs.lastRoll) {
      content.appendChild(renderRollBanner(cs.lastRoll));
    }

    const logBox = G.el('div', 'combat-log');
    cs.log.slice(-8).forEach(line => logBox.appendChild(G.el('div', null, line)));
    content.appendChild(logBox);

    if (!cs.finished) {
      const targetRow = G.el('div', 'target-row');
      const aliveEnemies = cs.enemies.filter(e => e.alive);
      const actions = G.el('div', 'combat-actions');

      const attackBtn = G.el('button', 'btn btn-primary', 'Attack');
      attackBtn.onclick = () => {
        if (aliveEnemies.length === 1) { doPlayerAction(() => CE.playerAttack(cs, aliveEnemies[0].uid)); return; }
        showTargetPicker(targetRow, aliveEnemies, (uid) => doPlayerAction(() => CE.playerAttack(cs, uid)));
      };
      actions.appendChild(attackBtn);

      const defendBtn = G.el('button', 'btn btn-secondary', 'Defend');
      defendBtn.onclick = () => doPlayerAction(() => CE.playerDefend(cs));
      actions.appendChild(defendBtn);

      const itemBtn = G.el('button', 'btn btn-secondary', 'Use Item');
      itemBtn.onclick = () => showItemPicker(actions);
      actions.appendChild(itemBtn);

      if (p.knownSpells && p.knownSpells.length > 0) {
        const spellBtn = G.el('button', 'btn btn-secondary', 'Cast Spell');
        spellBtn.onclick = () => showSpellPicker(actions, targetRow, aliveEnemies);
        actions.appendChild(spellBtn);
      }

      const canFlee = !cs.isBoss;
      const fleeBtn = G.el('button', 'btn btn-secondary' + (canFlee ? '' : ' btn-disabled'), canFlee ? 'Flee' : 'Cannot Flee (Boss)');
      fleeBtn.onclick = () => {
        if (!canFlee) { G.showToast('You cannot flee from a boss fight!'); return; }
        const avgSpd = aliveEnemies.reduce((s, e) => s + e.spd, 0) / aliveEnemies.length;
        const fled = CE.tryFlee(cs, cs.player.spd, avgSpd);
        if (!fled) {
          cs.initiativeIndex++;
          advanceQueueUntilPlayerTurnOrEnd(cs);
        }
        CE.checkCombatEnd(cs);
        syncPlayerHpMpFromCombat();
        G.render();
      };
      actions.appendChild(fleeBtn);

      content.appendChild(targetRow);
      content.appendChild(actions);
    } else {
      const cont = G.el('button', 'btn btn-primary', 'Continue');
      cont.onclick = () => resolveCombatEnd(cs);
      content.appendChild(cont);
    }

    root.appendChild(wrap);
    requestAnimationFrame(() => drawCombatScene(canvas, p, cs));
  };

  function renderRollBanner(roll) {
    const box = G.el('div', 'roll-banner');
    if (roll.kind === 'spell-heal') {
      box.classList.add('roll-hit');
      box.appendChild(G.el('div', 'roll-text', `${roll.actor} channels healing magic — restored ${roll.healed} HP.`));
      return box;
    }
    if (roll.kind === 'spell-aoe') {
      box.classList.add('roll-hit');
      box.appendChild(G.el('div', 'roll-text', `${roll.actor} unleashes ${roll.item} on the whole group!`));
      return box;
    }
    if (typeof roll.hit === 'boolean') {
      box.classList.add(roll.hit ? 'roll-hit' : 'roll-miss');
      const verb = roll.kind === 'spell' ? 'casts at' : 'attacks';
      box.appendChild(G.el('div', 'roll-text',
        `${roll.actor} ${verb} ${roll.target}: rolled ${roll.rollPct} (needed under ${roll.thresholdPct}) — ${roll.hit ? 'HIT!' : 'MISS!'}`));
      return box;
    }
    return box;
  }

  function showTargetPicker(container, aliveEnemies, onPick) {
    container.innerHTML = '';
    container.appendChild(G.el('div', 'pick-label', 'Choose a target:'));
    aliveEnemies.forEach(e => {
      const b = G.el('button', 'btn btn-small', `${e.name} (${e.hp} HP)`);
      b.onclick = () => onPick(e.uid);
      container.appendChild(b);
    });
  }

  // Consumables only (potions, ethers, antidotes) - spellbooks are handled by showSpellPicker instead.
  function showItemPicker(container) {
    const p = G.state.player;
    const lo = p.questLoadout;
    const existing = container.querySelector('.item-picker');
    if (existing) { existing.remove(); return; }
    const picker = G.el('div', 'item-picker');
    const usableInCombat = lo.consumables.filter(id => ITEMS[id] && !ITEMS[id].isPassiveLight);
    if (!usableInCombat.length) {
      picker.appendChild(G.el('div', 'empty-note', 'No usable consumables in your loadout.'));
    }
    const seen = new Set();
    lo.consumables.forEach(itemId => {
      if (seen.has(itemId)) return;
      seen.add(itemId);
      const item = ITEMS[itemId];
      // Passive light items (lanterns) are not usable in combat
      if (item && item.isPassiveLight) return;
      const count = lo.consumables.filter(c => c === itemId).length;
      const b = G.el('button', 'btn btn-small', `${item.name} x${count}`);
      b.onclick = () => {
        const cs = G.state.activeCombat;
        doPlayerAction(() => {
          CE.playerUseItem(cs, itemId);
          const idx = lo.consumables.indexOf(itemId);
          if (idx >= 0) lo.consumables.splice(idx, 1);
          PM.removeFromStorage(p, itemId); // actually consumed - no longer in town storage either
        });
      };
      picker.appendChild(b);
    });
    container.appendChild(picker);
  }

  // Known spells (from owned spellbooks) - free to cast as many times as MP allows, never consumed.
  function showSpellPicker(container, targetRow, aliveEnemies) {
    const p = G.state.player;
    const existing = container.querySelector('.item-picker');
    if (existing) { existing.remove(); return; }
    const picker = G.el('div', 'item-picker');
    if (!p.knownSpells.length) {
      picker.appendChild(G.el('div', 'empty-note', 'No spells known. Buy a spellbook from the Library.'));
    }
    p.knownSpells.forEach(itemId => {
      const item = ITEMS[itemId];
      const spell = item.spell;
      const mpNote = ` (${spell.mpCost} MP)`;
      const b = G.el('button', 'btn btn-small', `${item.name.replace('Spellbook: ', '')}${mpNote}`);
      if (G.state.activeCombat.player.mp < spell.mpCost) {
        b.classList.add('btn-disabled');
        b.onclick = () => G.showToast('Not enough MP for that spell.');
      } else if (spell.kind === 'damage') {
        b.onclick = () => {
          if (aliveEnemies.length === 1) { castSpell(itemId, aliveEnemies[0].uid); return; }
          showTargetPicker(targetRow, aliveEnemies, (uid) => castSpell(itemId, uid));
        };
      } else {
        b.onclick = () => castSpell(itemId, null);
      }
      picker.appendChild(b);
    });
    container.appendChild(picker);

    function castSpell(itemId, uid) {
      const cs = G.state.activeCombat;
      doPlayerAction(() => CE.playerCastSpell(cs, itemId, uid));
    }
  }

  function doPlayerAction(actionFn) {
    const cs = G.state.activeCombat;
    actionFn();
    if (!CE.checkCombatEnd(cs)) {
      cs.initiativeIndex++;
      cs.player._tickedThisSlot = false;
      advanceQueueUntilPlayerTurnOrEnd(cs);
      CE.checkCombatEnd(cs);
    }
    if (!cs.finished) cs.player.defending = false;
    syncPlayerHpMpFromCombat();
    G.render();
  }

  function resolveCombatEnd(cs) {
    const p = G.state.player;
    if (cs.result === 'victory') {
      const rewards = CE.endOfCombatRewards(cs);
      p.gold += rewards.gold;
      const levelUps = PM.grantXp(p, rewards.xp);
      rewards.loot.forEach(itemId => PM.addToStorage(p, itemId));
      const quest = QUESTS[p.activeQuest];
      if (quest) {
        p.questProgress = p.questProgress || { defeated: 0, collected: 0, bossDefeated: false };
        p.questProgress.defeated += cs.enemies.filter(e => !e.alive).length;
        if (cs.isBoss) p.questProgress.bossDefeated = true;
      }
      // Mini-boss room bonus: extra chest loot on victory
      if (G.state._pendingMiniBossLoot) {
        G.state._pendingMiniBossLoot = false;
        const mbArea = G.QUEST_AREAS[G.state.currentArea];
        const mbPool = getChestLootPool(mbArea || { recLevel: 4 });
        const mbBonus = mbPool[Math.floor(Math.random() * mbPool.length)];
        PM.addToStorage(p, mbBonus);
        rewards.loot.push(mbBonus);
        G.state.explorationLog.push(`The room yields its secret — you find: ${ITEMS[mbBonus].name}!`);
      }
      const lootLine = rewards.loot.length ? `, found: ${rewards.loot.map(i => ITEMS[i].name).join(', ')}` : '';
      G.state.explorationLog.push(`Victory! +${rewards.xp} XP, +${rewards.gold} gold${lootLine}.`);
      if (levelUps.length) levelUps.forEach(lu => G.state.explorationLog.push(`Level up! Now level ${lu.level}.`));
      G.state.lastLoot = rewards.loot.length ? rewards.loot[rewards.loot.length - 1] : null;
      G.state.activeCombat = null;
      G.goTo('exploring');
    } else if (cs.result === 'fled') {
      G.state.explorationLog.push('You escaped the battle.');
      G.state.activeCombat = null;
      G.goTo('exploring');
    } else if (cs.result === 'defeat') {
      G.state.activeCombat = null;
      G.goTo('defeat');
    }
  }

  // XP scaling: players earn reduced XP for quests below their level.
  // Gold, items, and loot are never reduced — only XP.
  function questXpScale(playerLevel, questRecLevel) {
    const gap = playerLevel - questRecLevel;
    if (gap <= 0) return 1.0;      // same level or harder: full XP
    if (gap === 1) return 0.75;    // 1 level above: 75%
    if (gap === 2) return 0.50;    // 2 levels above: 50%
    if (gap === 3) return 0.25;    // 3 levels above: 25%
    return 0;                       // 4+ levels above: no XP
  }
  // Returns the display string for scaled XP (e.g. "25% XP" or "" if full)
  function questXpLabel(playerLevel, questRecLevel) {
    const scale = questXpScale(playerLevel, questRecLevel);
    if (scale >= 1.0) return '';
    if (scale === 0) return 'No XP';
    return `${Math.round(scale * 100)}% XP`;
  }
  G.questXpScale = questXpScale;
  G.questXpLabel = questXpLabel;

  function completeQuest(quest) {
    const p = G.state.player;
    p.gold += quest.reward.gold;
    const scale = questXpScale(p.level, quest.recLevel);
    const scaledXp = Math.floor(quest.reward.xp * scale);
    const levelUps = PM.grantXp(p, scaledXp);
    (quest.reward.items || []).forEach(itemId => PM.addToStorage(p, itemId));
    // Consume exactly the required count of any collectItem objective item, leaving any surplus the
    // player happens to own (e.g. extra goblin ears picked up beyond the 3 actually needed) untouched.
    if (quest.objective && quest.objective.type === 'collectItem') {
      for (let i = 0; i < quest.objective.count; i++) {
        PM.removeFromStorage(p, quest.objective.item);
      }
    }
    p.completedQuests.push(quest.id);
    // Consume passive light items (lanterns) — they burn out when the quest ends
    if (p.questLoadout && p.questLoadout.consumables) {
      const burnedLanterns = p.questLoadout.consumables.filter(id => ITEMS[id] && ITEMS[id].isPassiveLight);
      burnedLanterns.forEach(id => PM.removeFromStorage(p, id));
      if (burnedLanterns.length > 0) G.state.explorationLog.push('🏮 Your Lantern burned out.');
    }
    p.activeQuest = null;
    p.questProgress = null;
    if (p.questLoadout) p.questLoadout._initialized = false;
    p.activeBuff = null; // church blessings last exactly one quest
    G.state.merchantOffer = null;
    G.state.lastLoot = null;
    const xpNote = scale < 1 ? (scale === 0 ? ' (no XP — outleveled)' : ` (${Math.round(scale*100)}% XP)`) : '';
    G.showToast(`Quest complete: ${quest.name}! +${quest.reward.gold} gold, +${scaledXp} XP${xpNote}`);
    G.goTo('town');
  }

  function isSpellRoll(cs) {
    return !!cs.lastPlayerActionWasSpell;
  }

  // Picks the most relevant "held item" to draw in the player's free hand: a potion if the last
  // action was using one, otherwise a spellbook glow if the last action was a spell cast.
  function heldItemForDisplay(cs) {
    if (cs.lastPlayerActionWasSpell) return 'spell';
    if (cs.lastPlayerActionWasPotion) return 'potion';
    return null;
  }

  function drawCombatScene(canvas, player, cs) {
    const ctx = canvas.getContext('2d');
    Sketch.drawNotebookBg(ctx, canvas.width, canvas.height);

    const playerX = 90, playerY = canvas.height - 50;
    // Label stack, drawn well above the character's head (head top sits around playerY-92*0.9≈-83).
    // Each line gets its own row with generous spacing so nothing clips into the sprite even with
    // a status-effect badge row added beneath the HP/MP block.
    let labelY = playerY - 140;
    Sketch.handText(ctx, player.name, playerX, labelY, { size: 13, color: '#444' });
    labelY += 18;
    const hpColor = cs.player.hp <= cs.player.maxHp * 0.25 ? '#b03030' : '#2c5f2d';
    Sketch.handText(ctx, `${Math.max(0, cs.player.hp)}/${cs.player.maxHp} HP`, playerX, labelY, { size: 15, color: hpColor });
    Sketch.scribbleUnderline(ctx, playerX, labelY + 4, 70, '#999');
    labelY += 20;
    if (cs.player.maxMp > 0) {
      Sketch.handText(ctx, `${Math.max(0, cs.player.mp)}/${cs.player.maxMp} MP`, playerX, labelY, { size: 12, color: '#3a5fa0' });
      labelY += 16;
    }
    if (cs.player.statusEffects && cs.player.statusEffects.length) {
      const labels = cs.player.statusEffects.map(s => CE.statusLabel(s)).join('  ');
      Sketch.handText(ctx, labels, playerX, labelY, { size: 11, color: '#a0522d' });
    }

    Sketch.drawCharacter(ctx, playerX, playerY, 0.9, player.gender, G.resolveEquipped(player), heldItemForDisplay(cs));

    const startX = 350, gap = 110;
    cs.enemies.forEach((e, i) => {
      const ex = startX + i * gap, ey = canvas.height - 90;
      let ey0 = ey - 100;
      Sketch.handText(ctx, e.name, ex, ey0, { size: 12, color: '#444' });
      ey0 += 17;
      const ehpColor = !e.alive ? '#999' : (e.hp <= e.maxHp * 0.25 ? '#b03030' : '#2c5f2d');
      Sketch.handText(ctx, e.alive ? `${e.hp}/${e.maxHp} HP` : 'Defeated', ex, ey0, { size: 14, color: ehpColor });
      Sketch.scribbleUnderline(ctx, ex, ey0 + 4, 64, '#999');
      ey0 += 18;
      if (e.alive && e.statusEffects && e.statusEffects.length) {
        const labels = e.statusEffects.map(s => CE.statusLabel(s)).join(' ');
        Sketch.handText(ctx, labels, ex, ey0, { size: 10, color: '#a0522d' });
      }
      if (!e.alive) { ctx.save(); ctx.globalAlpha = 0.22; }
      Sketch.drawEnemy(ctx, ex, ey, 1, G.ENEMIES[e.id].sketch);
      if (!e.alive) ctx.restore();
    });
  }

  G.renderDefeat = function (root) {
    const wrap = G.el('div', 'screen defeat-screen');
    wrap.appendChild(G.el('h2', null, 'You Have Fallen...'));
    wrap.appendChild(G.el('p', null, 'The Notebook Knight collapses, but a hand-drawn hero never truly fades.'));
    const p = G.state.player;
    p.hp = 1;
    // Lanterns burn out even on defeat
    if (p.questLoadout && p.questLoadout.consumables) {
      const burnedLanterns = p.questLoadout.consumables.filter(id => ITEMS[id] && ITEMS[id].isPassiveLight);
      burnedLanterns.forEach(id => PM.removeFromStorage(p, id));
    }
    p.activeQuest = null;
    p.questProgress = null;
    if (p.questLoadout) p.questLoadout._initialized = false;
    p.activeBuff = null;
    const btn = G.el('button', 'btn btn-primary', 'Return to Town');
    btn.onclick = () => G.goTo('town');
    wrap.appendChild(btn);
    root.appendChild(wrap);
  };
})();


function bootGame() { Game.render(); }
if (document.fonts && document.fonts.load) {
  Promise.all([
    document.fonts.load('16px "Patrick Hand"'),
    document.fonts.load('16px "Architects Daughter"')
  ]).catch(function(){}).then(bootGame);
  bootGame();
} else { bootGame(); }

</script></body></html>
